/* ---- tryComputeAnswer: parse a question string → answer string ---- */
function tryComputeAnswer(text) {
  function gcd(a,b){ a=Math.abs(a);b=Math.abs(b); return b===0?a:gcd(b,a%b); }
  function fracStr(n,d) {
    if(!d||!isFinite(n)||!isFinite(d)) return null;
    if(n===0) return '0';
    const g=gcd(Math.abs(n),Math.abs(d)); let sn=n/g, sd=d/g;
    if(sd<0){sn=-sn;sd=-sd;}
    if(sd===1) return String(sn);
    if(Math.abs(sn)>=sd){ const w=Math.trunc(sn/sd),r=sn-w*sd; return r===0?String(w):`${w} ${Math.abs(r)}/${sd}`; }
    return `${sn}/${sd}`;
  }
  function num(s){ return parseFloat(String(s).replace(/,/,'.')); }
  function fmt(v){ if(!isFinite(v)) return null; return Number.isInteger(v)?String(v):String(+(v.toFixed(4))); }
  function pi(r){ return +(3.14*r).toFixed(2); }

  let m;

  // --- Fraction simplification: פשט: N/D ---
  m = text.match(/^פשט:\s*(\d+)\/(\d+)/);
  if(m) return fracStr(+m[1], +m[2]);

  // --- Equivalent fraction: n1/d1 = ___/d2 ---
  m = text.match(/(\d+)\/(\d+)\s*=\s*___\/(\d+)/);
  if(m){ const [n1,d1,d2]=[+m[1],+m[2],+m[3]]; return String(n1*d2/d1); }

  // --- Fraction comparison: ציין אם n/d גדול/קטן ל-1/2 ---
  m = text.match(/(\d+)\/(\d+)\s+גדול[,\s]?קטן/);
  if(m){ const v=+m[1] / +m[2]; return v > 0.5 ? 'גדול מ-½' : v < 0.5 ? 'קטן מ-½' : 'שווה ל-½'; }

  // --- Fraction arithmetic: n/d OP n/d = ___ ---
  m = text.match(/(\d+)\/(\d+)\s*([+\-−×÷])\s*(\d+)\/(\d+)\s*=\s*___/);
  if(m) {
    const [a,b,op,c,d]=[+m[1],+m[2],m[3],+m[4],+m[5]];
    if(op==='+') return fracStr(a*d+c*b, b*d);
    if(op==='-'||op==='−') return fracStr(a*d-c*b, b*d);
    if(op==='×') return fracStr(a*c, b*d);
    if(op==='÷') return fracStr(a*d, b*c);
  }

  // --- Triple fraction: n/d OP n/d OP n/d = ___ ---
  m = text.match(/(\d+)\/(\d+)\s*([+\-−])\s*(\d+)\/(\d+)\s*([+\-−])\s*(\d+)\/(\d+)\s*=\s*___/);
  if(m) {
    const n1=+m[1],d1=+m[2],op1=m[3],n2=+m[4],d2=+m[5],op2=m[6],n3=+m[7],d3=+m[8];
    const lcd=d1*d2*d3/gcd(d1,gcd(d2,d3));
    let v=n1*(lcd/d1); v+=(op1==='+'?1:-1)*n2*(lcd/d2); v+=(op2==='+'?1:-1)*n3*(lcd/d3);
    return fracStr(v, lcd);
  }

  // --- Mixed number arithmetic: W n/d OP W n/d = ___ ---
  m = text.match(/(\d+)\s+(\d+)\/(\d+)\s*([+\-−])\s*(\d+)\s+(\d+)\/(\d+)\s*=\s*___/);
  if(m) {
    const w1=+m[1],n1=+m[2],d1=+m[3],op=m[4],w2=+m[5],n2=+m[6],d2=+m[7];
    const lcd=d1*d2/gcd(d1,d2);
    const tot1=w1*lcd+n1*(lcd/d1), tot2=w2*lcd+n2*(lcd/d2);
    return fracStr(op==='+'?tot1+tot2:tot1-tot2, lcd);
  }

  // --- W + n/d = ___ ---
  m = text.match(/^(\d+)\s*\+\s*(\d+)\/(\d+)\s*=\s*___/);
  if(m) return fracStr(+m[1]*(+m[3])+(+m[2]), +m[3]);

  // --- Simple arithmetic: A OP B = ___ ---
  m = text.match(/([\d,.]+)\s*([+\-−×÷])\s*([\d,.]+)\s*=\s*___/);
  if(m) {
    const a=num(m[1]),op=m[2],b=num(m[3]);
    if(op==='+') return fmt(a+b);
    if(op==='-'||op==='−') return fmt(a-b);
    if(op==='×') return fmt(a*b);
    if(op==='÷') return b!==0?fmt(a/b):null;
  }

  // --- Powers & roots ---
  m = text.match(/(\d+)\s*²\s*=\s*___/); if(m) return String(Math.pow(+m[1],2));
  m = text.match(/(\d+)\s*³\s*=\s*___/); if(m) return String(Math.pow(+m[1],3));
  m = text.match(/√(\d+)\s*=\s*___/); if(m){ const r=Math.sqrt(+m[1]); return Number.isInteger(r)?String(r):String(+r.toFixed(3)); }

  // --- Signed number arithmetic: (−A) × (−B) etc. ---
  m = text.match(/\(−(\d+)\)\s*([×÷+\-])\s*\(−(\d+)\)/);
  if(m){ const a=+m[1],op=m[2],b=+m[3]; if(op==='×') return String(a*b); if(op==='÷') return fmt(a/b); if(op==='+') return String(-a+(-b)); if(op==='-'||op==='−') return String(-a-(-b)); }
  m = text.match(/\(−(\d+)\)\s*²\s*=\s*___/); if(m) return String(Math.pow(+m[1],2));
  m = text.match(/\(−(\d+)\)\s*³\s*=\s*___/); if(m) return String(-Math.pow(+m[1],3));
  m = text.match(/−(\d+)\s*²\s*=\s*___/); if(m) return String(-Math.pow(+m[1],2));

  // --- Linear eq: ax + b = c  /  ax − b = c  /  ax = c  /  x + b = c ---
  m = text.match(/^(\d*\.?\d*)\s*x\s*([+\-−]\s*\d+\.?\d*)?\s*=\s*(-?\d+\.?\d*)\s*$/i);
  if(m && !text.match(/x²/i)) {
    const a=num(m[1]||'1'), bTerm=m[2]?num(m[2].replace(/[−\s]/g,s=>s==='−'?'-':s)):0, c=num(m[3]);
    if(a!==0){ const x=(c-bTerm)/a; return `x = ${fmt(x)}`; }
  }

  // --- x/a = b ---
  m = text.match(/x\s*\/\s*(\d+)\s*=\s*(-?\d+)/i);
  if(m) return `x = ${+m[1] * +m[2]}`;

  // --- A(x ± B) = C  (single number RHS) ---
  m = text.match(/^(\d+)\s*\(\s*x\s*([+\-−])\s*(\d+)\s*\)\s*=\s*(\d+)\s*$/);
  if(m){ const a=+m[1],b=(m[2]==='+'?1:-1)*+m[3],c=+m[4]; if(a!==0) return `x = ${fmt((c-a*b)/a)}`; }

  // --- A(x ± B) = C(x ± D)  /  A(x ± B) = (x ± D)C  (coeff before or after) ---
  // Normalise: extract (coeff, signedOffset) from each side
  function parseSide(s) {
    s = s.trim();
    let mm;
    mm = s.match(/^(\d+)\s*\(\s*x\s*([+\-−])\s*(\d+)\s*\)$/);
    if(mm) return {a:+mm[1], k:(mm[2]==='+'?1:-1)*+mm[3]};
    mm = s.match(/^\(\s*x\s*([+\-−])\s*(\d+)\s*\)\s*(\d+)$/);
    if(mm) return {a:+mm[3], k:(mm[1]==='+'?1:-1)*+mm[2]};
    return null;
  }
  m = text.match(/^(.+?)\s*=\s*(.+)$/);
  if(m) {
    const L=parseSide(m[1]), R=parseSide(m[2]);
    if(L && R) {
      // L.a*(x+L.k) = R.a*(x+R.k)  →  (L.a-R.a)x = R.a*R.k - L.a*L.k
      const coeff=L.a-R.a;
      if(coeff!==0) return `x = ${fmt((R.a*R.k - L.a*L.k)/coeff)}`;
    }
  }

  // --- A(B − x) = C(x ± D)  (b minus x) ---
  m = text.match(/^(\d+)\s*\(\s*(\d+)\s*[−\-]\s*x\s*\)\s*=\s*(\d+)\s*\(\s*x\s*([+\-−])\s*(\d+)\s*\)\s*$/);
  if(m){ const a=+m[1],b=+m[2],c=+m[3],d=(m[4]==='+'?1:-1)*+m[5];
    // a*(b-x)=c*(x+d)  →  ab-ax=cx+cd  →  -(a+c)x=cd-ab
    const coeff=-(a+c); return `x = ${fmt((c*d-a*b)/coeff)}`; }

  // --- A(x ± B) − C(x ± D) = E  (subtracted paren groups) ---
  m = text.match(/^(\d+)\s*\(\s*x\s*([+\-−])\s*(\d+)\s*\)\s*[−\-]\s*(\d+)\s*\(\s*x\s*([+\-−])\s*(\d+)\s*\)\s*=\s*(-?\d+)\s*$/);
  if(m){ const a=+m[1],b=(m[2]==='+'?1:-1)*+m[3],c=+m[4],d=(m[5]==='+'?1:-1)*+m[6],e=+m[7];
    // (a-c)x + (a*b-c*d) = e
    const coeff=a-c; if(coeff!==0) return `x = ${fmt((e-a*b+c*d)/coeff)}`; }

  // --- Ax − B(x − C) = D  (mixed, coeff times second paren) ---
  m = text.match(/^(\d+)\s*x\s*[−\-]\s*(\d+)\s*\(\s*x\s*[−\-]\s*(\d+)\s*\)\s*=\s*(-?\d+)\s*$/);
  if(m){ const a=+m[1],b=+m[2],c=+m[3],d=+m[4];
    // ax - b(x-c) = d  →  (a-b)x + bc = d
    const coeff=a-b; if(coeff!==0) return `x = ${fmt((d-b*c)/coeff)}`; }

  // --- Ax + B = Cx + D  (x on both sides, no parens) ---
  m = text.match(/^(-?\d*\.?\d+)\s*x\s*([+\-−]\s*\d+\.?\d*)\s*=\s*(-?\d*\.?\d+)\s*x\s*([+\-−]\s*\d+\.?\d*)\s*$/i);
  if(m && !text.includes('²')) {
    const a=num(m[1]), b=num(m[2].replace('−','-').replace(/\s/g,'')),
          c=num(m[3]), d=num(m[4].replace('−','-').replace(/\s/g,''));
    const coeff=a-c; if(coeff!==0) return `x = ${fmt((d-b)/coeff)}`; }

  // --- Quadratic (x±a)(x±b)=0 ---
  m = text.match(/\(x\s*([+\-−])\s*(\d+)\)\s*\(x\s*([+\-−])\s*(\d+)\)\s*=\s*0/);
  if(m) {
    const r1=(m[1]==='+'?-1:1)*+m[2], r2=(m[3]==='+'?-1:1)*+m[4];
    return `x = ${r1} או x = ${r2}`;
  }

  // --- Quadratic x² ± bx ± c = 0 ---
  m = text.match(/x²\s*([+\-−]\s*\d+)\s*x\s*([+\-−]\s*\d+)\s*=\s*0/);
  if(m) {
    const b=num(m[1].replace('−','-').replace(/\s/g,'')), c=num(m[2].replace('−','-').replace(/\s/g,''));
    const disc=b*b-4*c;
    if(disc<0) return 'אין פתרון ממשי (Δ<0)';
    if(disc===0) return `x = ${fmt(-b/2)}`;
    const s=Math.sqrt(disc);
    return `x₁ = ${fmt((-b+s)/2)}, x₂ = ${fmt((-b-s)/2)}`;
  }

  // --- System of equations: { x + y = R1 ; x − y = R2 } ---
  m = text.match(/x\s*\+\s*y\s*=\s*(\d+).*x\s*[−\-]\s*y\s*=\s*(-?\d+)/s);
  if(m){ const r1=+m[1],r2=+m[2]; return `x = ${(r1+r2)/2}, y = ${(r1-r2)/2}`; }

  // --- Percentage ---
  m = text.match(/(\d+)%\s+(?:של|מ[ה\-]?\s*)[- ]?\s*([\d.]+)/);
  if(m) return fmt(+m[1] * +m[2] / 100);

  // --- Geometry: perimeter of square ---
  m = text.match(/היקף\s+(?:הריבוע|ריבוע)[^\d]*(\d+)/);
  if(m) return `${4 * +m[1]} ס"מ`;

  // --- Geometry: perimeter of rectangle ---
  m = text.match(/היקף\s+(?:המלבן|מלבן)[^\d]*(\d+)[^\d]+(\d+)/);
  if(m) return `${2*(+m[1]+ +m[2])} ס"מ`;

  // --- Geometry: area of rectangle ---
  m = text.match(/שטח\s+(?:המלבן|מלבן)[^\d]*(\d+)[^\d]+(\d+)/);
  if(!m) m = text.match(/אורך\s*=?\s*(\d+)[^\d]+רוחב\s*=?\s*(\d+)/);
  if(m) return `${+m[1] * +m[2]} ס"מ²`;

  // --- Geometry: area + perimeter of square ---
  m = text.match(/(?:היקף\s+ושטח|שטח\s+והיקף)\s+ריבוע[^\d]*(\d+)/);
  if(m){ const s=+m[1]; return `שטח: ${s*s} ס"מ², היקף: ${4*s} ס"מ`; }

  // --- Geometry: area of triangle ---
  m = text.match(/שטח\s+משולש[^\d]*(\d+)[^\d]+(\d+)/);
  if(m) return `${+m[1] * +m[2] / 2} ס"מ²`;

  // --- Geometry: circle perimeter/area ---
  m = text.match(/היקף\s+עיגול.*?(?:קוטר|רדיוס)\s*=\s*(\d+)/);
  if(m){ const r=text.includes('קוטר')?+m[1]/2:+m[1]; return `${pi(2*r)} ס"מ`; }
  m = text.match(/שטח\s+עיגול[^\d]*(\d+)/);
  if(m) return `${pi(+m[1] * +m[1])} ס"מ²`;

  // --- Geometry: volume of box ---
  m = text.match(/נפח\s+תיבה[^\d]*(\d+)[^\d]+(\d+)[^\d]+(\d+)/);
  if(m) return `${+m[1] * +m[2] * +m[3]} ס"מ³`;

  // --- Geometry: trapezoid area ---
  m = text.match(/שטח\s+טרפז[^\d]*(\d+)[^\d]+(\d+)[^\d]+(\d+)/);
  if(m) return `${(+m[1] + +m[2]) / 2 * +m[3]} ס"מ²`;

  // --- Triangle angles: two given, find third ---
  m = text.match(/זווית\s+א['']\s*=\s*(\d+)°.*?זווית\s+ב['']\s*=\s*(\d+)°/s);
  if(m) return `זווית ג' = ${180 - +m[1] - +m[2]}°`;

  // --- Pythagorean theorem ---
  m = text.match(/(\d+)²\s*\+\s*(\d+)²/);
  if(m){ const c=Math.sqrt(Math.pow(+m[1],2)+Math.pow(+m[2],2)); return `${Number.isInteger(c)?c:+c.toFixed(2)}`; }

  // --- Tens/units of a number ---
  m = text.match(/כמה\s+עשרות\s+ב[ה-]?(\d+)/); if(m) return `${Math.floor(+m[1]/10)} עשרות`;
  m = text.match(/כמה\s+אחדות\s+ב[ה-]?(\d+)/); if(m) return `${+m[1]%10} אחדות`;

  // --- Fill-in blanks: ___ OP B = C ---
  m = text.match(/___\s*([+\-−])\s*([\d.]+)\s*=\s*([\d.]+)/);
  if(m){ const op=m[1],b=num(m[2]),c=num(m[3]); return fmt(op==='+'?c-b:c+b); }
  m = text.match(/([\d.]+)\s*([+\-−])\s*___\s*=\s*([\d.]+)/);
  if(m){ const a=num(m[1]),op=m[2],c=num(m[3]); return fmt(op==='+'?c-a:a-c); }

  return null;
}

/* ---- buildAnswersHTML: build the solutions page ---- */
function buildAnswersHTML(subject, grade, diff, exercisePlan) {
  const today = new Date().toLocaleDateString('he-IL');
  const items = exercisePlan.map((item, idx) => {
    const num = idx + 1;
    const ans = item.answer !== null && item.answer !== undefined ? item.answer : '—';
    const ansHTML = `<span class="ans-value">${ans}</span>`;
    return `
      <div class="answer-item">
        <span class="ans-num">${num}</span>
        <div class="ans-content">
          <div class="ans-question">${item.text}</div>
          ${ansHTML}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="ws-header">
      <div>
        <div class="ws-title">דף פתרונות — ${subject}</div>
        <div class="ws-meta">
          <span>📚 כיתה ${grade}</span>
          <span>📅 ${today}</span>
          <span>🔑 ${exercisePlan.length} פתרונות</span>
        </div>
      </div>
      <div class="ws-logo">🔑</div>
    </div>
    <div class="answers-teacher-note">⚠️ דף זה מיועד למורה בלבד — אין להפיץ לתלמידים</div>
    <div class="answer-grid">${items}</div>
    <div class="ws-footer">
      <div>📌 ${subject} | כיתה ${grade} | ${difficultyLabels[diff]}</div>
    </div>`;
}

/* ---- toggleAnswers: switch between worksheet and answers ---- */
function toggleAnswers() {
  const btn = document.getElementById('btn-answers');
  const out = document.getElementById('worksheet-output');
  if (!_showingAnswers) {
    const { subject, grade, diff } = _lastBuildParams;
    out.innerHTML = buildAnswersHTML(subject, grade, diff, _lastExercisePlan);
    btn.textContent = '📄 חזור לדף השאלות';
    btn.classList.add('active');
    _showingAnswers = true;
  } else {
    out.innerHTML = _lastWorksheetHTML;
    btn.textContent = '📋 הצג פתרונות';
    btn.classList.remove('active');
    _showingAnswers = false;
  }
}

function generateWorksheet() {
  const subject = document.getElementById('subject').value.trim();
  const grade   = document.getElementById('grade').value;
  const diff    = document.querySelector('input[name="difficulty"]:checked').value;
  const ctype   = document.querySelector('input[name="content-type"]:checked').value;

  if (!subject) {
    showSubjectError('חובה להכניס נושא מתמטי');
    return;
  }
  if (!isMathSubject(subject)) {
    showSubjectError('הנושא אינו מתמטי — הכנס נושא כגון: כפל, גיאומטריה, שברים, אלגברה...');
    return;
  }
  if (!grade) {
    const el = document.getElementById('grade');
    el.style.borderColor = '#dc2626'; el.focus();
    setTimeout(() => el.style.borderColor = '', 2000);
    return;
  }

  document.getElementById('loading').classList.add('active');
  document.getElementById('btn-generate').disabled = true;

  setTimeout(() => {
    try {
      const html = buildWorksheetHTML(subject, grade, diff, ctype);
      _lastWorksheetHTML = html;
      _lastBuildParams   = { subject, grade, diff, ctype };
      _showingAnswers    = false;
      const btn = document.getElementById('btn-answers');
      if (btn) { btn.textContent = '📋 הצג פתרונות'; btn.classList.remove('active'); }
      document.getElementById('worksheet-output').innerHTML = html;
      document.getElementById('empty-state').style.display    = 'none';
      document.getElementById('preview-wrapper').style.display = 'block';
      document.getElementById('preview-wrapper').scrollIntoView({ behavior:'smooth', block:'start' });
    } finally {
      document.getElementById('loading').classList.remove('active');
      document.getElementById('btn-generate').disabled = false;
    }
  }, 600);
}

function buildWorksheetHTML(subject, grade, diff, ctype) {
  const today    = new Date().toLocaleDateString('he-IL');
  const gradeNum = gradeToNum(grade);

  function getDiffList(total, d) {
    if (d === 'mixed') {
      const list = [];
      for (let i=0;i<6; i++) list.push('easy');
      for (let i=0;i<10;i++) list.push('medium');
      for (let i=0;i<4; i++) list.push('hard');
      return list.slice(0, total);
    }
    return Array(total).fill(d);
  }

  let exercisePlan = [];

  function pushEx(text, d, type) {
    exercisePlan.push({ text, answer: tryComputeAnswer(text), difficulty: d, type });
  }

  if (ctype === 'exercises') {
    getDiffList(20, diff).forEach((d, i) => {
      pushEx(makeExercise(subject, d, gradeNum, i), d, 'exercise');
    });
  } else if (ctype === 'verbal') {
    for (let i=0;i<10;i++) {
      const d = diff==='mixed'?(i<3?'easy':i<8?'medium':'hard'):diff;
      pushEx(makeVerbalQuestion(subject, d, gradeNum, i), d, 'verbal');
    }
  } else {
    getDiffList(12, diff).forEach((d, i) => {
      exercisePlan.push({ text: makeExercise(subject, d, gradeNum, i), difficulty: d, type: 'exercise' });
    });
    for (let i=0;i<8;i++) {
      const d = diff==='mixed'?(i<2?'easy':i<6?'medium':'hard'):diff;
      pushEx(makeVerbalQuestion(subject, d, gradeNum, i), d, 'verbal');
    }
  }

  _lastExercisePlan = exercisePlan;   // save for answer sheet

  const exercises = exercisePlan.filter(e => e.type === 'exercise');
  const verbals   = exercisePlan.filter(e => e.type === 'verbal');

  const badgeClass = { easy:'badge-easy', medium:'badge-medium', hard:'badge-hard', mixed:'badge-mixed' };
  const diffBadge  = `<span class="difficulty-badge ${badgeClass[diff]}">${difficultyLabels[diff]}</span>`;
  const countLabel = ctype==='exercises'?`${exercises.length} תרגילים`:ctype==='verbal'?`${verbals.length} שאלות מילוליות`:`${exercises.length} תרגילים + ${verbals.length} שאלות מילוליות`;

  function wrapMath(text) {
    // Split text into Hebrew segments and non-Hebrew (math) segments.
    // Non-Hebrew segments get wrapped in a LTR <span class="math"> so that
    // minus signs and operators always appear in the correct left-to-right order,
    // while Hebrew words remain naturally RTL.
    const HEB = /[\u0590-\u05FF\uFB1D-\uFB4E\u05F3\u05F4]/;
    return text.replace(/[^\u0590-\u05FF\uFB1D-\uFB4E\u05F3\u05F4]+/g, match => {
      const trimmed = match.trim();
      if (!trimmed) return match; // pure whitespace — keep as-is
      const lead  = match.match(/^\s*/)[0];
      const trail = match.match(/\s*$/)[0];
      return `${lead}<span class="math">${trimmed}</span>${trail}`;
    });
  }

  function renderItem(item, num) {
    const cls = item.type === 'verbal' ? 'verbal' : item.difficulty;
    const answerHTML = item.type === 'verbal'
      ? `<div class="ex-answer-lines">${'<div class="line"></div>'.repeat(3)}</div>`
      : `<div class="ex-answer-line"></div>`;
    return `
      <li class="exercise-item">
        <div class="ex-num ${cls}">${num}</div>
        <div class="ex-content">
          <div class="ex-text">${wrapMath(item.text)}</div>
          ${answerHTML}
        </div>
      </li>`;
  }

  const exSection = exercises.length === 0 ? '' : `
    <div class="ws-section">
      <div class="ws-section-title">✏️ חלק א׳ — תרגילים ${diffBadge}</div>
      <ul class="exercise-list">${exercises.map((e,i)=>renderItem(e,i+1)).join('')}</ul>
    </div>`;

  const vSection = verbals.length === 0 ? '' : `
    <div class="ws-section">
      <div class="ws-section-title">💬 ${exercises.length>0?'חלק ב׳ — ':''}שאלות מילוליות ${diffBadge}</div>
      <ul class="exercise-list">${verbals.map((v,i)=>renderItem(v,exercises.length+i+1)).join('')}</ul>
    </div>`;

  return `
    <div class="ws-header">
      <div>
        <div class="ws-title">דף עבודה — ${subject}</div>
        <div class="ws-meta">
          <span>📚 כיתה ${grade}</span>
          <span>📅 ${today}</span>
          <span>📝 ${countLabel}</span>
        </div>
      </div>
      <div class="ws-logo">📄</div>
    </div>
    <div class="ws-student-info">
      <div class="info-line">שם: ___________________________</div>
      <div class="info-line">מספר: _________</div>
      <div class="info-line">תאריך: ___________________</div>
    </div>
    ${exSection}${vSection}
    <div class="ws-footer">
      <div>📌 ${subject} | כיתה ${grade} | ${difficultyLabels[diff]}</div>
    </div>`;
}

function resetForm() {
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('preview-wrapper').style.display = 'none';
  document.getElementById('worksheet-output').innerHTML = '';
  document.getElementById('subject').value = '';
}
</script>
</body>
</html>
