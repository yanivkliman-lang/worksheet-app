<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>יוצר דפי עבודה</title>
  <style>
    /* ==================== GENERAL ==================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      direction: rtl;
    }

    /* ==================== APP SHELL ==================== */
    .app-header {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .app-header .logo { font-size: 2rem; }
    .app-header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    .app-header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 2px; }

    .main-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      max-width: 1280px;
      margin: 28px auto;
      padding: 0 24px;
    }

    /* ==================== FORM PANEL ==================== */
    .form-panel {
      background: white;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      height: fit-content;
      position: sticky;
      top: 24px;
    }

    .form-panel h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1e40af;
      margin-bottom: 22px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e2e8f0;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #1a202c;
      background: #f9fafb;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: white;
    }

    /* Toggle group */
    .toggle-group {
      display: flex;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      overflow: hidden;
    }
    .toggle-group input[type="radio"] { display: none; }
    .toggle-group label {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      color: #6b7280;
      background: #f9fafb;
      border-left: 1.5px solid #d1d5db;
      transition: background .15s, color .15s;
      margin: 0;
    }
    .toggle-group label:first-of-type { border-left: none; }
    .toggle-group input[type="radio"]:checked + label {
      background: #2563eb;
      color: white;
    }

    /* Section title inside form */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: #9ca3af;
      margin: 22px 0 12px;
    }

    /* Grade hints box */
    .grade-hints {
      margin-top: 10px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 0.78rem;
      color: #166534;
      line-height: 1.7;
    }
    .grade-hints strong {
      display: block;
      font-size: 0.8rem;
      color: #14532d;
      margin-bottom: 4px;
    }
    .grade-hints ul {
      margin: 0;
      padding-right: 16px;
    }
    .grade-hints ul li { margin-bottom: 2px; }

    /* Info box */
    .info-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 0.78rem;
      color: #1d4ed8;
      line-height: 1.6;
      margin-top: 6px;
    }
    .info-box b { color: #1e40af; }

    /* Generate button */
    .btn-generate {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      letter-spacing: .3px;
      box-shadow: 0 4px 12px rgba(37,99,235,.3);
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    .btn-generate:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(37,99,235,.35);
    }
    .btn-generate:active { transform: translateY(0); }
    .btn-generate:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* ==================== PREVIEW PANEL ==================== */
    .preview-panel {
      min-height: 300px;
    }

    .preview-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      justify-content: flex-end;
    }
    .btn-print, .btn-new {
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-print {
      background: #059669;
      color: white;
      box-shadow: 0 2px 8px rgba(5,150,105,.25);
    }
    .btn-print:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(5,150,105,.3); }
    .btn-new {
      background: white;
      color: #374151;
      border: 1.5px solid #d1d5db;
    }
    .btn-new:hover { background: #f9fafb; transform: translateY(-1px); }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      border-radius: 14px;
      padding: 60px 32px;
      color: #9ca3af;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      text-align: center;
      min-height: 400px;
    }
    .empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.1rem; color: #6b7280; margin-bottom: 8px; }
    .empty-state p  { font-size: 0.85rem; line-height: 1.6; }

    /* ==================== WORKSHEET ==================== */
    #worksheet-output {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 40px 48px;
      font-size: 0.92rem;
      line-height: 1.7;
    }

    .ws-header {
      border-bottom: 3px solid #1e40af;
      padding-bottom: 16px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .ws-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1e40af;
      margin-bottom: 4px;
    }
    .ws-meta {
      font-size: 0.82rem;
      color: #6b7280;
      display: flex;
      gap: 16px;
    }
    .ws-meta span { display: flex; align-items: center; gap: 4px; }
    .ws-logo {
      font-size: 2.5rem;
      opacity: .15;
    }

    .ws-student-info {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 28px;
    }
    .ws-student-info .info-line {
      border-bottom: 1.5px solid #94a3b8;
      padding-bottom: 4px;
      font-size: 0.82rem;
      color: #6b7280;
    }

    .ws-section {
      margin-bottom: 32px;
    }
    .ws-section-title {
      font-size: 1rem;
      font-weight: 800;
      color: #1e40af;
      background: #eff6ff;
      border-right: 4px solid #2563eb;
      padding: 8px 14px;
      border-radius: 0 8px 8px 0;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .difficulty-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      margin-right: 8px;
    }
    .badge-easy   { background: #d1fae5; color: #065f46; }
    .badge-medium { background: #fef3c7; color: #92400e; }
    .badge-hard   { background: #fee2e2; color: #991b1b; }
    .badge-mixed  { background: #e0e7ff; color: #3730a3; }

    /* Exercise list */
    .exercise-list { list-style: none; }
    .exercise-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px dashed #e2e8f0;
    }
    .exercise-item:last-child { border-bottom: none; }
    .ex-num {
      min-width: 28px;
      height: 28px;
      background: #2563eb;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .ex-num.easy   { background: #059669; }
    .ex-num.medium { background: #d97706; }
    .ex-num.hard   { background: #dc2626; }
    .ex-num.verbal { background: #7c3aed; }

    .ex-content { flex: 1; }
    .ex-text {
      font-size: 0.9rem;
      color: #1a202c;
      direction: rtl;
      text-align: left;
    }
    .ex-text .math {
      direction: ltr;
      display: inline-block;
      unicode-bidi: bidi-override;
    }
    .ex-answer-line {
      margin-top: 6px;
      border-bottom: 1px solid #cbd5e1;
      width: 100%;
      height: 22px;
    }
    .ex-answer-lines { margin-top: 6px; }
    .ex-answer-lines .line {
      border-bottom: 1px solid #cbd5e1;
      height: 22px;
      margin-bottom: 4px;
    }

    /* Worksheet footer */
    .ws-footer {
      margin-top: 32px;
      padding-top: 14px;
      border-top: 2px solid #e2e8f0;
      font-size: 0.75rem;
      color: #9ca3af;
    }

    /* ==================== ANSWER SHEET ==================== */
    .btn-answers {
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: #7c3aed;
      color: white;
      box-shadow: 0 2px 8px rgba(124,58,237,.25);
      transition: transform .15s, box-shadow .15s, background .2s;
    }
    .btn-answers:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,58,237,.3); }
    .btn-answers.active { background: #4b5563; }

    .answers-teacher-note {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 22px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 700;
      color: #92400e;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }
    .answer-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .ans-num {
      min-width: 26px;
      height: 26px;
      background: #059669;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ans-content { flex: 1; min-width: 0; }
    .ans-question {
      font-size: 0.74rem;
      color: #9ca3af;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ans-value {
      font-size: 0.95rem;
      font-weight: 700;
      color: #059669;
      direction: rtl;
      font-family: 'Segoe UI', monospace;
    }
    .ans-value.hint { color: #d97706; font-weight: 600; font-size: 0.82rem; }

    /* ==================== LOADING ==================== */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(3px);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 1rem; font-weight: 600; color: #1e40af; }

    /* ==================== PRINT ==================== */
    @media print {
      body { background: white; }
      .app-header, .form-panel, .preview-actions { display: none !important; }
      .main-layout { display: block; margin: 0; padding: 0; }
      .preview-panel { padding: 0; }
      #worksheet-output {
        box-shadow: none;
        border-radius: 0;
        padding: 20px 30px;
        font-size: 11pt;
      }
      .ex-num { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .ws-section-title { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .difficulty-badge { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    }

    @media (max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; }
      .form-panel { position: static; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="logo">📄</div>
  <div>
    <h1>יוצר דפי עבודה</h1>
    <p>צור דפי עבודה מקצועיים ומותאמים אישית לכיתה שלך</p>
  </div>
</header>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">יוצר דף עבודה...</div>
</div>

<div class="main-layout">

  <!-- FORM PANEL -->
  <aside class="form-panel">
    <h2>⚙️ הגדרות דף העבודה</h2>

    <div class="field">
      <label>כיתה</label>
      <select id="grade" onchange="updateGradeHints()">
        <option value="">בחר כיתה...</option>
        <option value="א׳">כיתה א׳</option>
        <option value="ב׳">כיתה ב׳</option>
        <option value="ג׳">כיתה ג׳</option>
        <option value="ד׳">כיתה ד׳</option>
        <option value="ה׳">כיתה ה׳</option>
        <option value="ו׳">כיתה ו׳</option>
        <option value="ז׳">כיתה ז׳</option>
        <option value="ח׳">כיתה ח׳</option>
        <option value="ט׳">כיתה ט׳</option>
      </select>
      <div class="grade-hints" id="grade-hints" style="display:none;"></div>
    </div>

    <div class="field">
      <label>נושא הדף <span style="color:#dc2626;font-size:0.8rem;">* חובה — נושא מתמטי בלבד</span></label>
      <input type="text" id="subject" placeholder="למשל: כפל וחילוק, גיאומטריה, שברים, אלגברה..." />
    </div>

    <div class="section-title">דרגת קושי</div>
    <div class="field">
      <div class="toggle-group" id="difficulty-group">
        <input type="radio" name="difficulty" id="d-easy"   value="easy"   checked />
        <label for="d-easy">קל</label>
        <input type="radio" name="difficulty" id="d-medium" value="medium" />
        <label for="d-medium">בינוני</label>
        <input type="radio" name="difficulty" id="d-hard"   value="hard"   />
        <label for="d-hard">קשה</label>
        <input type="radio" name="difficulty" id="d-mixed"  value="mixed"  />
        <label for="d-mixed">מעורב</label>
      </div>
      <div class="info-box" id="difficulty-info" style="margin-top:8px;">
        20 תרגילים — <b>קל</b>
      </div>
    </div>

    <div class="section-title">סוג התוכן</div>
    <div class="field">
      <div class="toggle-group" id="type-group">
        <input type="radio" name="content-type" id="ct-exercises" value="exercises" checked />
        <label for="ct-exercises">תרגילים</label>
        <input type="radio" name="content-type" id="ct-verbal"    value="verbal"    />
        <label for="ct-verbal">שאלות מילוליות</label>
        <input type="radio" name="content-type" id="ct-mix"       value="mix"       />
        <label for="ct-mix">מיקס</label>
      </div>
      <div class="info-box" id="type-info" style="margin-top:8px;">
        <b>20 תרגילים</b> בלבד
      </div>
    </div>

    <button class="btn-generate" id="btn-generate" onclick="generateWorksheet()">
      ✨ צור דף עבודה
    </button>
  </aside>

  <!-- PREVIEW PANEL -->
  <main class="preview-panel">
    <div id="empty-state" class="empty-state">
      <div class="icon">📝</div>
      <h3>הדף שלך יופיע כאן</h3>
      <p>מלא את הפרטים בצד שמאל<br/>ולחץ על "צור דף עבודה"</p>
    </div>

    <div id="preview-wrapper" style="display:none;">
      <div class="preview-actions">
        <button class="btn-new" onclick="resetForm()">🔄 דף חדש</button>
        <button class="btn-answers" id="btn-answers" onclick="toggleAnswers()">📋 הצג פתרונות</button>
        <button class="btn-print" onclick="window.print()">🖨️ הדפס</button>
      </div>
      <div id="worksheet-output"></div>
    </div>
  </main>

</div>

<script>
/* ============================================================
   CONSTANTS & UI HELPERS
   ============================================================ */
const difficultyLabels = { easy:'קל', medium:'בינוני', hard:'קשה', mixed:'מעורב' };

// Band ordering helper — replaces broken string comparisons like bandAtMost(band, 'elem_mid')
const BAND_ORDER = ['elem_low', 'elem_mid', 'elem_high', 'middle', 'high_low'];
function bandAtMost(band, maxBand) {
  return BAND_ORDER.indexOf(band) <= BAND_ORDER.indexOf(maxBand);
}

/* ============================================================
   GRADE HINTS — נושאי לימוד לפי כיתה
   ============================================================ */
const GRADE_HINTS = {
  'א׳': ['חיבור וחיסור עד 20', 'ספירה קדימה ואחורה', 'השוואת כמויות', 'צורות גיאומטריות בסיסיות (עיגול, ריבוע, משולש)'],
  'ב׳': ['חיבור וחיסור עד 100', 'מבוא לכפל (קבוצות שוות)', 'ערך המיקום (עשרות ואחדות)', 'מדידת אורך בס"מ'],
  'ג׳': ['לוח הכפל עד 10', 'חילוק בסיסי', 'שברים פשוטים (½, ⅓, ¼)', 'חיבור וחיסור עד 1000', 'שעות ודקות'],
  'ד׳': ['כפל וחילוק עם מספרים גדולים', 'שברים: השוואה ופישוט', 'שטח והיקף של מלבן וריבוע', 'זוויות וסוגיהן', 'מ.מ.כ ומ.מ.ש'],
  'ה׳': ['שברים: חיבור, חיסור, כפל', 'מספרים עשרוניים', 'אחוזים בסיסיים', 'נפח של תיבה', 'שטח משולש', 'סטטיסטיקה בסיסית (ממוצע)'],
  'ו׳': ['אחוזים: חישובים מורכבים', 'יחסים ופרופורציות', 'מספרים שליליים — מבוא', 'שטח עיגול והיקפו', 'מבוא לאלגברה (ביטויים)', 'הסתברות בסיסית'],
  'ז׳': ['מספרים מכוונים (שלמים)', 'משוואות לינאריות עם נעלם אחד', 'ביטויים אלגבריים', 'גיאומטריה: זוויות ומשולשים', 'סטטיסטיקה: ממוצע, חציון, שכיח', 'הסתברות'],
  'ח׳': ['מערכת משוואות (2 נעלמים)', 'אי-שוויונות', 'פיתגורס', 'גיאומטריה אנליטית — מבוא', 'חזקות ושורשים', 'שברים אלגבריים'],
  'ט׳': ['פונקציה לינארית', 'פונקציה ריבועית (פרבולה)', 'משוואה ריבועית', 'טריגונומטריה בסיסית (sin, cos, tan)', 'גיאומטריה: עיגול ותכונותיו', 'סדרות חשבוניות'],
};

function updateGradeHints() {
  const grade = document.getElementById('grade').value;
  const box   = document.getElementById('grade-hints');
  if (!grade || !GRADE_HINTS[grade]) {
    box.style.display = 'none';
    return;
  }
  const topics = GRADE_HINTS[grade];
  box.innerHTML = `<strong>נושאים מומלצים לכיתה ${grade}:</strong><ul>${topics.map(t => `<li>${t}</li>`).join('')}</ul>`;
  box.style.display = 'block';
}

function updateInfoBoxes() {

                            '<b>12 תרגילים</b> + <b>8 שאלות מילוליות</b>';
}

/* ============================================================
   GRADE UTILITIES
   ============================================================ */
function gradeToNum(grade) {
  const map = {'א׳':1,'ב׳':2,'ג׳':3,'ד׳':4,'ה׳':5,'ו׳':6,'ז׳':7,'ח׳':8,'ט׳':9};
  return map[grade] || 7;
}

// Returns a band string based on grade number
function getBand(g) {
  if (g <= 2) return 'elem_low';   // כיתות א-ב
  if (g <= 4) return 'elem_mid';   // כיתות ג-ד
  if (g <= 6) return 'elem_high';  // כיתות ה-ו
  if (g <= 8) return 'middle';     // כיתות ז-ח
  return 'high_low';               // כיתה ט
}

/* ============================================================
   MATH HELPERS
   ============================================================ */
function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr)      { return arr[rnd(0, arr.length - 1)]; }

// Pythagorean triples for clean integer answers
const PYTH_TRIPLES = [
  [3,4,5],[5,12,13],[8,15,17],[7,24,25],[20,21,29],
  [9,40,41],[6,8,10],[9,12,15],[12,16,20],[15,20,25],
  [10,24,26],[5,5,Math.round(5*Math.sqrt(2)*10)/10]
];
function pythTriple() { return pick(PYTH_TRIPLES.slice(0, 10)); }

/* ============================================================
   SUBJECT DETECTION
   ============================================================ */
function detectSubject(s) {
  s = s.toLowerCase();
  if (s.includes('קודקוד') || s.includes('משלימ') || s.includes('צמוד') || s.includes('חוצה זווית') || s.includes('חוצה-זווית')) return 'angles';
  if (s.includes('גיאומטר') || s.includes('צורות') || s.includes('זווית') || s.includes('זוויות') || s.includes('משולש') || s.includes('עיגול') || s.includes('מעגל')) return 'geometry';
  if (s.includes('טריגונומטר') || s.includes('טריגו') || s.includes('סינוס') || s.includes('קוסינוס') || s.includes('טנגנס')) return 'trig';
  if (s.includes('פונקצי'))  return 'functions';
  if (s.includes('מספרים מכוונים') || s.includes('מכוונים') || s.includes('מכוון') || s.includes('שלמים') || s.includes('חיובי') || s.includes('שלילי')) return 'signed_numbers';
  if (s.includes('אלגברה') || s.includes('אלגבר') || s.includes('ביטויים אלגבר') || s.includes('משוואה') || s.includes('נעלם') || s.includes('אי-שוויון') || s.includes('אי שוויון') || s.includes('ביטוי') || s.includes('למצוא x') || s.includes('מציאת x') || s.includes('למצוא את x')) return 'algebra';
  if (s.includes('שבר') && s.includes('מעורב')) return 'fractions_mixed';
  if (s.includes('שבר') && (s.includes('כפל') || s.includes('חילוק'))) return 'fractions_mult';
  if (s.includes('שבר') && (s.includes('חיבור') || s.includes('חיסור') || s.includes('חסור'))) return 'fractions_add';
  if (s.includes('שבר'))  return 'fractions';
  if (s.includes('אחוז')) return 'percent';
  if (s.includes('כפל') || s.includes('חילוק')) return 'mult_div';
  if (s.includes('חיבור') || s.includes('חיסור') || s.includes('חסור')) return 'add_sub';
  if (s.includes('סטטיסט') || s.includes('ממוצע') || s.includes('חציון') || s.includes('נתונים')) return 'statistics';
  if (s.includes('סדרה') || s.includes('סדרות')) return 'sequences';
  if (s.includes('הסתברות')) return 'probability';
  if (s.includes('וקטור') || s.includes('מטריצ')) return 'vectors';
  return 'general';
}

/* ============================================================
   GEOMETRY EXERCISES — GRADE-AWARE
   ============================================================ */
function geoExercise(diff, band) {

  /* ── כיתות א-ב ── */
  if (band === 'elem_low') {
    const easy = [
      `כמה צלעות יש לריבוע?`, `כמה צלעות יש למשולש?`, `כמה פינות יש למלבן?`,
      `ציין איזו צורה יש ל: שולחן / גלגל / פיצה`, `צייר ריבוע שצלעו 3 ס"מ`
    ];
    const medium = [
      `ציין אם הצורות זהות, דומות או שונות: ריבוע ומלבן`,
      `כמה צלעות יש לחמשמש?`, `מה ההבדל בין ריבוע למלבן?`,
      `ציין כמה פינות ישרות יש למלבן`
    ];
    const hard = [
      `ציין כמה צלעות שוות לריבוע`, `צייר שני משולשים שונים`,
      `כמה ציר-סימטריה יש לריבוע?`
    ];
    return pick(diff === 'easy' ? easy : diff === 'hard' ? hard : medium);
  }

  /* ── כיתות ג-ד ── */
  if (band === 'elem_mid') {
    const a = rnd(3,12), b = rnd(3,12), s = rnd(4,10);
    const easy = [
      `היקף הריבוע כאשר צלעו ${s} ס"מ`,
      `היקף המלבן: אורך = ${a} ס"מ, רוחב = ${b} ס"מ`,
      `ריבוע בעל היקף ${s*4} ס"מ — מה אורך צלעו?`
    ];
    const medium = [
      `שטח המלבן: אורך = ${a} ס"מ, רוחב = ${b} ס"מ`,
      `מלבן ששטחו ${a*b} מ"ר ואורכו ${a} מ' — מה רוחבו?`,
      `היקף ושטח ריבוע עם צלע ${s} ס"מ`
    ];
    const hard = [
      `צורת L מורכבת ממלבן ${a}×${b} ממנו הוצא ריבוע ${rnd(1,Math.min(a,b)-1)}×${rnd(1,Math.min(a,b)-1)}. חשב את שטחה`,
      `היקף מלבן ${2*(a+b)} ס"מ. אם אורכו גדול פי ${rnd(2,3)} מרוחבו, מצא את מימדיו`,
      `שטח שני מלבנים: ${a}×${b} ו-${rnd(3,8)}×${rnd(3,8)}. איזה גדול יותר?`
    ];
    return pick(diff === 'easy' ? easy : diff === 'hard' ? hard : medium);
  }

  /* ── כיתות ה-ו ── */
  if (band === 'elem_high') {
    const a = rnd(4,16), b = rnd(4,16), h = rnd(3,12), r = rnd(3,9);
    const easy = [
      `שטח משולש: בסיס = ${a} ס"מ, גובה = ${h} ס"מ`,
      `היקף עיגול (קוטר = ${r*2} ס"מ, π ≈ 3.14)`,
      `שטח ריבוע שצלעו ${a} ס"מ`
    ];
    const medium = [
      `שטח עיגול: רדיוס = ${r} ס"מ (π ≈ 3.14)`,
      `נפח תיבה: ${a} × ${b} × ${h} ס"מ`,
      `צורה מורכבת ממלבן ${a}×${b} ומעוד משולש בסיס ${a} גובה ${h}. חשב שטח כולל`
    ];
    const hard = [
      `עיגול חסום בריבוע שצלעו ${r*2} ס"מ. חשב את השטח שבין הריבוע לעיגול (π ≈ 3.14)`,
      `שטח טרפז: בסיסים ${a} ו-${b} ס"מ, גובה ${h} ס"מ`,
      `בריכה גלילית: רדיוס ${r} מ', עומק ${h} מ'. חשב נפח (π ≈ 3.14)`
    ];
    return pick(diff === 'easy' ? easy : diff === 'hard' ? hard : medium);
  }

  /* ── כיתות ז-ח ── */
  if (band === 'middle') {
    const [a, b, c] = pythTriple();
    const ang1 = rnd(30,80), ang2 = rnd(20, 90-ang1);
    const ang3 = 180 - ang1 - ang2;
    const ext = 180 - ang1;
    const easy = [
      `במשולש ישר-זווית: רגל א' = ${a}, רגל ב' = ${b}. חשב את היפותנוזה`,
      `סכום הזוויות במשולש הוא 180°. זווית א' = ${ang1}°, זווית ב' = ${ang2}°. מה זווית ג'?`,
      `ישר עובר בין שתי ישרות מקבילות ויוצר זווית של ${ang1}°. מה הזווית המתחלפת?`,
      `במשולש שווה-שוקיים: זווית הראש = ${rnd(20,100)}°. מה כל אחת מזוויות הבסיס?`
    ];
    const medium = [
      `משולש ישר-זווית: רגל = ${a}, היפותנוזה = ${c}. חשב את הרגל השנייה`,
      `שני ישרים מקבילים, חותכן יוצר זווית ${ang1}°. מצא את כל 8 הזוויות הנוצרות`,
      `במשולש: הזווית החיצונית = ${ext}°. שתי הזוויות הלא-סמוכות = ${ang2}° ו-___. מצא`,
      `ריבוע בתוך עיגול: אורך האלכסון = ${rnd(6,12)}√2 ס"מ. מצא היקף הריבוע`
    ];
    const hard = [
      `הוכח: הזווית החיצונית של משולש שווה לסכום שתי הזוויות הלא-סמוכות`,
      `שני משולשים דומים. יחס הדמיון ${rnd(2,4)}:1. הצלע הקצרה של הגדול = ${rnd(8,16)} ס"מ. מצא צלעות הקטן`,
      `עיגול ומשולש משיקים: הרדיוס = ${rnd(4,8)} ס"מ, הצלע המשיקת = ${rnd(6,14)} ס"מ. חשב שטח כל אחד`,
      `ב-△ABC: AB=${a}, BC=${b}, AC=${c}. הוכח שהמשולש ישר-זווית`
    ];
    return pick(diff === 'easy' ? easy : diff === 'hard' ? hard : medium);
  }

  /* ── כיתה ט: דמיון משולשים, תכונות מרובעים ── */
  const ratio9 = rnd(2,4);
  const [pa9, pb9] = pythTriple();
  const ang9 = pick([30,45,60]);
  const sinV9 = {30:'½', 45:'√2/2', 60:'√3/2'}[ang9];
  const tanV9 = {30:'√3/3', 45:'1', 60:'√3'}[ang9];
  const hyp9 = rnd(8,20), side9 = rnd(6,14);
  const easy = [
    `שני משולשים דומים: יחס צלעות ${ratio9}:1. צלע בגדול = ${pa9*ratio9} ס"מ. מצא הצלע המקבילה בקטן`,
    `במשולש ישר-זווית: היפותנוזה=${hyp9}, זווית=${ang9}°. חשב הצלע הנגדית (sin${ang9}°=${sinV9})`,
    `מקבילית: בסיס=${side9} ס"מ, גובה=${rnd(4,10)} ס"מ. חשב שטח`,
    `מעוין: אלכסונות ${pa9*2} ו-${pb9*2} ס"מ. חשב שטח (½×d₁×d₂)`
  ];
  const medium = [
    `△ABC ~ △DEF לפי זז"ז. יחס דמיון ${ratio9}:1. שטח △ABC = ${rnd(10,30)} ס"מ². חשב שטח △DEF (שים לב: יחס שטחים = ריבוע יחס האורכים)`,
    `בטרפז ישר-זווית: בסיסים ${rnd(4,8)} ו-${rnd(6,12)} ס"מ, גובה ${rnd(4,8)} ס"מ. חשב שטח ואת אורך הצלע האלכסונית`,
    `הוכח: אלכסוני מקבילית חוצים זה את זה (השתמש בחפיפת משולשים)`,
    `מצא x: צלע במשולש גדול = ${ratio9}x, הצלע המקבילה בקטן = ${rnd(4,8)} ס"מ, יחס דמיון ${ratio9}:1`
  ];
  const hard = [
    `△ABC ~ △ADE (D על AB, E על AC). AD=${rnd(3,6)}, AB=${rnd(7,12)}, BC=${rnd(6,10)}. חשב DE ויחס השטחים (מצוינות: הסק יחס נפחים)`,
    `הוכח: בכל מעוין, האלכסונות מאונכים זה לזה`,
    `מגדל גבוה H. מנקודה A (${hyp9} מ' מבסיסו) זווית ראייה=${ang9}°. חשב H (tan${ang9}°=${tanV9}). מנקודה B (${hyp9+rnd(5,10)} מ') — כמה קטנה הזווית?`
  ];
  return pick(diff === 'easy' ? easy : diff === 'hard' ? hard : medium);
}

/* ============================================================
   ANGLES — קודקודיות, משלימות, צמודות, חוצה זווית (כיתות ד-ח)
   ============================================================ */
function anglesExercise(diff, band) {
  const a = rnd(20, 80), b = rnd(15, 70);
  const comp = 90 - a;          // משלים ל-90°
  const supp = 180 - a;         // משלים ל-180°
  const vert = a;               // קודקודית = שווה
  const adj  = 180 - a;        // צמודה על ישר = משלימה ל-180°
  const bsct = Math.round(a/2); // חוצה זווית

  if (bandAtMost(band, 'elem_mid')) {
    // כיתות ג-ד: מושגים בסיסיים
    const easy = [
      `זווית של ${a}° — מהי הזווית המשלימה אותה ל-90°?`,
      `זווית של ${a}° — מהי הזווית המשלימה אותה ל-180°?`,
      `ציין: זווית ${rnd(1,89)}° — חדה, קהה, או ישרה?`
    ];
    const medium = [
      `שתי זוויות צמודות על ישר. אחת ${a}°. מה השנייה?`,
      `זווית ישרה חולקה ל-${bsct}° ו-___°`,
      `שתי זוויות משלימות ל-180°. אחת ${a}°. מה השנייה?`
    ];
    const hard = [
      `שתי זוויות משלימות ל-90°. אחת גדולה פי 2 מהשנייה. מצא אותן`,
      `זווית פי ${rnd(2,4)} מחברתה ל-180°. מצא את הזוויות`
    ];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }

  // כיתות ה-ח: קודקודיות, חוצה זווית, ישרים מקבילים
  const x_supp = rnd(10, 40);   // for algebraic angle questions
  const easy = [
    `זווית ${a}° — מהי הזווית הקודקודית לה?`,
    `שתי זוויות צמודות על ישר: ${a}° ו-___°`,
    `זווית ${a}° — חוצה הזווית יוצר זווית של ___°`,
    `שתי זוויות משלימות ל-180°. אחת ${a}°. מה השנייה?`
  ];
  const medium = [
    `ישר חוצה זווית של ${a*2}°. כל חצי = ___°`,
    `שתי זוויות צמודות: (${x_supp}+x)° ו-(3x+${x_supp*2})°. הן על ישר אחד. מצא x`,
    `שני ישרים נחצים. זווית אחת ${a}°. מצא את שלוש הזוויות האחרות (קודקודית, וצמודות)`,
    `זווית קהה ושלמה: ${supp}°. הזווית הצמודה = ___°. קודקודית לצמודה = ___°`
  ];
  const hard = [
    `שני ישרים מקבילים, חותכן יוצר זווית ${a}°. ציין: מתחלפות, מתאימות, וצמודות פנימיות`,
    `ישרים מקבילים: זווית ידועה ${a}°. מצא את כל 8 הזוויות עם נימוק לכל אחת`,
    `שתי זוויות צמודות: (${x_supp+10}+2x)° ו-(${x_supp}+3x)°. הן על ישר. מצא x ואת הזוויות`,
    `חוצה זוויות: ∠AOB=${a*2}°. OC חוצה. ∠COB = ___°. אם OD חוצה ∠COB, ∠DOB = ___°`
  ];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   SIGNED NUMBERS — GRADE-AWARE (כיתות ו-ט בעיקר)
   ============================================================ */
function signedNumbersExercise(diff, band) {
  const a = rnd(2,9), b = rnd(2,9), c = rnd(2,9);
  const easy = [
    `(+${a}) + (−${b}) = ___`,
    `(−${a}) + (−${b}) = ___`,
    `(+${a}) − (−${b}) = ___`,
    `(−${a}) + (+${b}) = ___`,
    `מה הערך המוחלט של −${a}?`,
    `סדר מהקטן לגדול: −${a}, +${b}, −${c}, 0`,
    `−${a} + ${b} = ___`,
    `${b} − ${a+c} = ___`
  ];
  const medium = [
    `(−${a}) × (−${b}) = ___`,
    `(+${a}) × (−${b}) = ___`,
    `(−${a*b}) ÷ (−${b}) = ___`,
    `(−${a}) × ${b} = ___`,
    `(${a} − ${a+b}) × (−${c}) = ___`,
    `−${a} + ${b} − ${c} + ${rnd(1,9)} = ___`,
    `(−${a}) + (−${b}) − (−${c}) = ___`,
    `${rnd(2,5)} × (−${a}) + ${rnd(2,4)} × ${b} = ___`
  ];
  const hard = [
    `(−${a})² = ___`,
    `−${a}² = ___ (האם זה אותו דבר?)`,
    `(−${a}) × (−${b}) ÷ (−${c}) = ___`,
    `(−${a} + ${b}) × (${c} − ${a+b}) = ___`,
    `−${a}x = ${a*b} (x = ___)`,
    `(−${a})³ = ___`,
    `(−${a})² + (−${b})² = ___`,
    `סדר וחשב: (−${a}) + (−${b})² − ${c} = ___`
  ];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   ALGEBRA EXERCISES — GRADE-AWARE
   ============================================================ */
function algebraExercise(diff, band, gradeNum) {
  gradeNum = gradeNum || 7;
  if (band === 'elem_low') {
    const c = rnd(5,15), b = rnd(1,c-1);
    const easy   = [`השלם: ___ + ${b} = ${c}`, `השלם: ${c} − ___ = ${b}`, `מה המספר? ○ + ${b} = ${c}`];
    const medium = [`השלם: ${b} + ___ = ${c}`, `___ × ${rnd(2,4)} = ${rnd(2,4)*rnd(2,6)}`];
    const hard   = [`___ + ___ = ${c} (מצא שתי אפשרויות)`, `${rnd(2,5)} × ___ = ${rnd(2,5)*rnd(2,6)}`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  if (band === 'elem_mid') {
    const a=rnd(2,5), b=rnd(1,9), sol=rnd(2,9);
    const easy   = [`x + ${b} = ${sol+b}`, `x − ${b} = ${sol}`];
    const medium = [`${a}x = ${a*sol}`, `x/${a} = ${sol}`];
    const hard   = [`${a}x + ${b} = ${a*sol+b}`, `${a}x − ${b} = ${a*sol-b}`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  if (band === 'elem_high') {
    const a=rnd(2,5), b=rnd(1,9), sol=rnd(1,10);
    const easy   = [`${a}x + ${b} = ${a*sol+b}`, `x/${a} + ${b} = ${sol+b}`];
    const medium = [`${a}x − ${b} = ${a*sol-b}`, `${b} − ${a}x = ${b-a*sol}`];
    const hard   = [`${a}(x + ${b}) = ${a*(sol+b)}`, `x/${a} − ${b} = ${sol-b}`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  if (band === 'middle') {
    const a=rnd(2,5), b=rnd(1,8), c=rnd(2,4), d=rnd(1,8), sol=rnd(1,8);

    if (gradeNum <= 7) {
      // כיתה ז: משוואה לינארית ב-x אחד, עם סוגריים והוצאת גורם
      const easy = [
        `${a}x + ${b} = ${a*sol+b}`,
        `${a}x − ${b} = ${a*sol-b}`,
        `x + ${b} = ${sol+b}`,
        `${a}x = ${a*sol}`
      ];
      const medium = [
        `${a}(x + ${b}) = ${a*(sol+b)}`,
        `${a}(x − ${b}) = ${a*(sol-b)}`,
        `${a}x + ${b} = ${c}x + ${d}`,
        `${b} − ${a}x = ${b - a*sol}`
      ];
      const hard = [
        `${a}(${b} − x) = ${a}(x + ${d})`,
        `${a}(x + ${b}) − ${c}(x − ${d}) = ${a*(sol+b) - c*(sol-d)}`,
        `${a}(x + ${b}) = ${c}(x + ${d})`,
        `${a}x − ${b}(x − ${c}) = ${d}`
      ];
      return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
    } else {
      // כיתה ח: משוואות עם שברים ומערכת 2 נעלמים
      const x1=rnd(1,6), y1=rnd(1,6), x2=rnd(1,4), y2=rnd(1,4);
      const r1 = x1+y1, r2 = x1-y1;
      const easy = [
        `${a}x + ${b} = ${c}x + ${d}`,
        `${a}(x − ${b}) = ${c}(x + ${d})`
      ];
      const medium = [
        `מערכת משוואות:{ x + y = ${r1} ; x − y = ${r2} }`,
        `${a}x + ${b} > ${a*sol+b} (אי-שוויון — הצג על ציר המספרים)`
      ];
      const hard = [
        `מערכת משוואות:{ ${a}x + ${b}y = ${a*x1+b*y1} ; ${c}x − ${d}y = ${c*x1-d*y1} }`,
        `מערכת משוואות:{ ${x2}x + y = ${x2*x1+y1} ; x − ${y2}y = ${x1-y2*y1} }`
      ];
      return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
    }
  }
  /* ── כיתה ט: ריבועית, נוסחאות כפל מקוצר ── */
  const r1_hl=rnd(-5,5), r2_hl=rnd(-5,5);
  const B_hl=-(r1_hl+r2_hl), C_hl=r1_hl*r2_hl;
  const Bstr = B_hl>0?`+${B_hl}`:B_hl<0?`${B_hl}`:'';
  const Cstr = C_hl>0?`+${C_hl}`:C_hl<0?`${C_hl}`:'';
  const p_hl=rnd(-6,6)||1, q_hl=rnd(-10,10);
  const base_sq=rnd(2,7);
  const easy = [
    `ריבועית בפירוק לגורמים:x²${Bstr}x${Cstr} = 0`,
    `(x+${Math.abs(r1_hl)})(x−${Math.abs(r2_hl)}) = 0`,
    `הרחב (נוסחת כפל מקוצר): (x + ${base_sq})² = ___`,
    `פרק: x² − ${base_sq**2} = (x + ___ )(x − ___) (הפרש ריבועים)`
  ];
  const medium = [
    `בנוסחת השורשים:x² + ${p_hl}x + ${q_hl} = 0 (חשב דיסקרימיננט קודם)`,
    `מצא קודקוד הפרבולה וציר סימטריה: y = x² + ${p_hl}x + ${q_hl}`,
    `פרק לגורמים: ${rnd(2,4)}x² + ${rnd(2,4)*rnd(1,4)*2}x + ${rnd(1,4)**2*rnd(2,4)} (טרינום מלא)`,
    `אי-שוויון:x²${Bstr}x${Cstr} < 0`
  ];
  const hard = [
    `עבור אילו ערכי k ל-x² + ${p_hl}x + k = 0 יש: שני פתרונות? פתרון אחד? אין פתרון? (חקור לפי Δ)`,
    `שטח מלבן ${rnd(20,60)} ס"מ². אורכו גדול ב-${rnd(2,6)} מרוחבו. הגדר משוואה ריבועית ופתור`,
    `הוכח גיאומטרית: (a+b)² = a² + 2ab + b² על ידי חישוב שטח ריבוע (a+b)×(a+b)`
  ];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   FRACTIONS — GRADE-AWARE
   ============================================================ */
function fractionsExercise(diff, band) {
  const d1=rnd(2,8), d2=rnd(2,8), n1=rnd(1,d1-1), n2=rnd(1,d2-1);
  if (bandAtMost(band, 'elem_mid')) {
    const easy   = [`ציין אם ${n1}/${d1} גדול, קטן או שווה ל-½`, `פשט: ${n1*2}/${d1*2}`, `${n1}/${d1} = ___/${d1*3}`];
    const medium = [`${n1}/${d1} + ${n2}/${d1} = ___`, `${n1+n2}/${d1} − ${n2}/${d1} = ___`];
    const hard   = [`${n1}/${d1} + ${n2}/${d2} = ___`, `${n1}/${d1} × ${n2}/${d2} = ___`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  if (band === 'elem_high') {
    const w1=rnd(1,3);
    const easy   = [`${n1}/${d1} + ${n2}/${d2} = ___`, `פשט: ${n1*3}/${d1*3}`];
    const medium = [`${w1} + ${n1}/${d1} = ___`, `${w1}${n1}/${d1} − ${n2}/${d2} = ___`];
    const hard   = [`${n1}/${d1} ÷ ${n2}/${d2} = ___`, `(${n1}/${d1} + ${n2}/${d2}) × ${rnd(2,5)} = ___`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  // middle+
  const a=rnd(2,5), b=rnd(1,9);
  const easy   = [`פשט: (${a}x²)/(${a*rnd(2,3)}x)`, `${n1}/${d1} + ${n2}/${d2} + ${rnd(1,d1)}/${d1}`];
  const medium = [`פשט: (x²−${b**2})/((x+${b})(x−${rnd(1,5)}))`, `${n1}/${d1}·x = ${rnd(2,10)}`];
  const hard   = [`(${a}/${b}x − ${rnd(1,5)}) ÷ (${rnd(2,4)}/${b}x)`, `פשט: (x²+${2*b}x+${b**2})/(x+${b})`];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   FRACTIONS — ADDITION / SUBTRACTION ONLY
   ============================================================ */
function fractionsAddExercise(diff, band) {
  const d1=rnd(2,9), d2=rnd(2,9), n1=rnd(1,d1-1||1), n2=rnd(1,d2-1||1);
  const lcd = d1*d2; // simple common denominator for display
  if (bandAtMost(band, 'elem_mid')) {
    const easy   = [`${n1}/${d1} + ${n2}/${d1} = ___`, `${n1+n2}/${d1} − ${n2}/${d1} = ___`];
    const medium = [`${n1}/${d1} + ${n2}/${d2} = ___`, `${n1}/${d1} − ${n2}/${d2} = ___  (${n1}/${d1} > ${n2}/${d2}?)`];
    const hard   = [`${n1}/${d1} + ${n2}/${d2} − ${rnd(1,d1-1||1)}/${d1} = ___`, `השלם: ___ + ${n2}/${d2} = 1`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  // elem_high+: like denominators then unlike
  const w1=rnd(1,4), w2=rnd(1,4);
  const easy   = [`${n1}/${d1} + ${n2}/${d1} = ___`, `${w1+w2}/${d1} − ${n2}/${d1} = ___`, `${n1}/${d1} + ${n2}/${d2} = ___`];
  const medium = [`${n1}/${d1} − ${n2}/${d2} = ___`, `${n1}/${d1} + ${n2}/${d2} + ${rnd(1,d1-1||1)}/${d1} = ___`, `${rnd(1,4)}/${d1} − ${rnd(1,d2-1||1)}/${d2} = ___`];
  const hard   = [`השלם: ${n1}/${d1} + ___ = ${n1}/${d1} + ${n2}/${d2}`, `${n1}/${d1} + ${n2}/${d2} − ${rnd(1,d2-1||1)}/${d2} = ___`, `כמה יש להוסיף ל-${n1}/${d1} כדי לקבל ${rnd(1,3) + n1/d1 < 5 ? Math.ceil(n1/d1+1) : 2}?`];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   FRACTIONS — MIXED NUMBERS (שברים מעורבים)
   ============================================================ */
function fractionsMixedExercise(diff, band) {
  function gcd(a,b){ return b===0?a:gcd(b,a%b); }
  // generate a "nice" pair of mixed numbers with given denominator
  function mixed(w, n, d) { return n===0 ? `${w}` : `${w}${n}/${d}`; }

  const d = pick([2,3,4,5,6,8]);      // single denominator for easy exercises
  const d2 = pick([3,4,5,6]);          // second denominator for unlike-denom exercises
  const w1=rnd(1,5), n1=rnd(1,d-1), w2=rnd(1,4), n2=rnd(1,d-1);
  const w3=rnd(1,4), n3=rnd(1,d2-1);

  // sum with same denominator (no regrouping needed)
  const sumN = n1+n2, sumW = w1+w2 + Math.floor(sumN/d), sumFrac = sumN%d;
  const sumStr = mixed(sumW, sumFrac, d);

  if (bandAtMost(band, 'elem_mid')) {
    // grades 3-4: whole number + fraction, and simple mixed addition same denom
    const easy   = [`${w1} + ${n1}/${d} = ___`, `${mixed(w1,n1,d)} − ${n1}/${d} = ___`];
    const medium = [`${mixed(w1,n1,d)} + ${mixed(w2,n2,d)} = ___`, `${sumStr} − ${mixed(w2,n2,d)} = ___`];
    const hard   = [`${mixed(w1,n1,d)} + ${n3}/${d2} = ___`, `${mixed(w1,n1,d)} − ${mixed(w2,n2,d)} = ___  (אם n1≥n2)`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }

  // elem_high (grade 5-6): unlike denominators, regrouping
  const un1 = rnd(1,d-1), un2 = rnd(1,d2-1);
  // unlike-denom sum
  const lcm = d*d2/gcd(d,d2);
  const sumNum = un1*(lcm/d) + un2*(lcm/d2);
  const wholePart = w1+w3+Math.floor(sumNum/lcm);
  const fracPart  = sumNum%lcm;
  const g = gcd(fracPart,lcm);
  const ansStr = fracPart===0 ? `${wholePart}` : `${wholePart}${fracPart/g}/${lcm/g}`;

  const easy   = [
    `${mixed(w1,n1,d)} + ${mixed(w2,n2,d)} = ___   (מכנה משותף: ${d})`,
    `${mixed(w1+w2,sumFrac,d)} − ${mixed(w2,n2,d)} = ___`,
    `${mixed(w1,n1,d)} + ${w2} = ___`
  ];
  const medium = [
    `${mixed(w1,un1,d)} + ${mixed(w3,un2,d2)} = ___`,
    `${mixed(w1+w3+1, lcm-fracPart>0?lcm-fracPart:1, lcm)} − ${mixed(w3,un2,d2)} = ___`,
    `${mixed(w1,n1,d)} − ${mixed(w2,n2,d)} = ___  (שים לב: ייתכן שתצטרך להמיר)`
  ];
  const hard   = [
    `${mixed(w1,un1,d)} + ${mixed(w3,un2,d2)} − 1 = ___`,
    `השלם: ${mixed(w1,un1,d)} + ___ = ${mixed(w1+w3+1, Math.floor(sumNum%lcm), lcm)}`,
    `${rnd(3,6)}⅓ + ${rnd(1,3)}¾ = ___  (רמז: המר לשברים רגילים תחילה)`
  ];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   FRACTIONS — MULTIPLICATION / DIVISION ONLY
   ============================================================ */
function fractionsMultExercise(diff, band) {
  const d1=rnd(2,8), d2=rnd(2,8), n1=rnd(1,d1-1||1), n2=rnd(1,d2-1||1);
  const w1=rnd(1,4), w2=rnd(1,3);

    const hard   = [`${w1}${n1}/${d1} × ${w2}${n2}/${d2} = ___`, `${w1}${n1}/${d1} ÷ ${n2}/${d2} = ___`];

}

/* ============================================================
   PERCENT — GRADE-AWARE
   ============================================================ */
function percentExercise(diff, band) {
  const base = rnd(2,20)*10, pct = [10,15,20,25,30,40,50,75][rnd(0,7)];
  if (bandAtMost(band, 'elem_high')) {
    const easy   = [`${pct}% מ-${base}`, `מה הם 50% מ-${base}?`];
    const medium = [`חנות: מוצר ${base} ₪, הנחה ${pct}%. מה המחיר החדש?`, `${pct}% מ-___ = ${base*pct/100}`];
    const hard   = [`מחיר עלה ב-${pct}% ל-${Math.round(base*(1+pct/100))} ₪. מה היה המחיר המקורי?`, `${rnd(20,80)} הוא ${pct}% ממה?`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  const oldP = rnd(100,600), rise = rnd(10,45);
  const newP = Math.round(oldP*(1+rise/100));
  const easy   = [`${pct}% מ-${base}`, `מה אחוז ה-${rnd(10,50)} מ-${rnd(50,200)}?`];
  const medium = [
    `מחיר עלה ב-${rise}% ל-${newP} ₪. מה המחיר המקורי?`,
    `מחיר עלה ב-${rise}% ואחר-כך ירד ב-${rnd(10,30)}%. מה שינוי האחוז הכולל?`
  ];
  const hard   = [
    `ריבית דריבית: קרן ${base*10} ₪, ריבית ${rnd(3,8)}% לשנה. כמה אחרי ${rnd(2,5)} שנים?`,
    `אחרי שתי הנחות עוקבות (${pct}% ו-${rise}%) מוצר עולה ${rnd(50,200)} ₪. מה היה מחירו המקורי?`
  ];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   MULTIPLICATION / DIVISION — GRADE-AWARE
   ============================================================ */
function multDivExercise(diff, band) {
  /* כיתות א-ב: כפל כחיבור חוזר, לוח הכפל כמבוא */
  if (band === 'elem_low') {
    const a=rnd(2,5), b=rnd(2,5);
    const easy   = [`${a} × ${b} = ___  (כתוב גם כחיבור חוזר: ___ + ___ + ...)`, `${a*b} ÷ ${a} = ___`];
    const medium = [`כמה ₪ שווים ${b} מטבעות של ${a} ₪?`, `${rnd(2,5)} × ${rnd(2,5)} = ___ ; בדוק: ${rnd(2,5)} + ${rnd(2,5)} + ${rnd(2,5)} = ___`];
    const hard   = [`${rnd(2,4)} × ${rnd(2,5)} = ___ (כתוב ${rnd(2,5)} + ${rnd(2,5)} + ...)`, `${rnd(3,6)} שורות, ${rnd(2,5)} כסאות בכל שורה. כמה כסאות בסך הכל?`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  /* כיתות ג-ד: אלגוריתם מאונך, חילוק עם שארית, אומדן, סימני חלוקה */
  if (band === 'elem_mid') {
    const a=rnd(11,99), b=rnd(2,9), big=rnd(100,999);
    const divNum = pick([2,3,5,9,10]);
    const easy   = [`${a} × ${b} = ___`, `${a*b} ÷ ${b} = ___`, `אמוד: ${rnd(20,50)} × ${rnd(3,9)} ≈ ___ (עגל לעשרות)`];
    const medium = [`בכתב מאונך: ${big} × ${b}`, `${big} ÷ ${b} = ___ שלמים ו-___ שארית`, `האם ${big} מתחלק ב-${divNum}? הסבר את סימן החלוקה`];
    const hard   = [`מצא מ.מ.כ ומ.מ.ש של ${rnd(12,24)} ו-${rnd(12,24)}`, `פרק לגורמים ראשוניים: ${rnd(20,80)} (ציין עץ גורמים)`, `${rnd(100,999)} ÷ ${rnd(11,20)} = ___ שלמים ו-___ שארית`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  /* כיתות ה-ו: מספרים גדולים, מ.מ.כ ומ.מ.ש מורכב */
  if (band === 'elem_high') {
    const a=rnd(10,99), b=rnd(10,99);
    const easy   = [`${a} × ${b} = ___`, `${rnd(1000,9999)} ÷ ${rnd(2,9)} = ___`];
    const medium = [`${rnd(100,999)} × ${rnd(10,99)} = ___ (כתב מאונך)`, `מצא מ.מ.כ ומ.מ.ש של ${rnd(12,40)} ו-${rnd(12,40)}`];
    const hard   = [`פרק לגורמים ראשוניים: ${rnd(50,200)}. כמה גורמים ראשוניים?`, `${rnd(10,15)}² = ___ ; ${rnd(2,4)}⁵ = ___`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  // כיתות ז+: חזקות ושורשים
  const a=rnd(2,6), n=rnd(2,4);
  const easy   = [`${a}² = ___ ; ${a}³ = ___`, `√${[4,9,16,25,36,49,64,81,100][rnd(0,8)]} = ___`];
  const medium = [`פשט: ${a}^${n} × ${a}^${rnd(2,3)} ÷ ${a}^${rnd(1,2)}`, `√${[4,9,16,25][rnd(0,3)]} × √${[4,9,25,36][rnd(0,3)]}`];
  const hard   = [`פשט: (${a}^${n})^${rnd(2,3)} ÷ ${a}^${rnd(4,8)}`, `הוכח ש-√2 הוא מספר אי-רציונלי (בדרך ההוכחה בדרך הסתירה)`];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   ADDITION / SUBTRACTION — GRADE-AWARE
   ============================================================ */
function addSubExercise(diff, band) {
  /* כיתות א-ב: מבנה עשרוני, חיבור/חיסור עד 100, עם/בלי המרה */
  if (band === 'elem_low') {
    const a=rnd(1,9), b=rnd(1,9), ca=rnd(5,9), cb=rnd(5,9);
    const tens_a=rnd(1,4)*10, tens_b=rnd(1,4)*10;
    const easy = [
      `${a} + ${b} = ___`,
      `${a+b} − ${b} = ___`,
      `___ + ${a} = ${a+b}`,
      `כמה עשרות ב-${rnd(11,99)}? כמה אחדות?`
    ];
    const medium = [
      `${ca} + ${cb} = ___ (שים לב: המרה!)`,
      `${rnd(11,19)} − ${rnd(2,9)} = ___`,
      `${tens_a} + ${tens_b} = ___`,
      `${rnd(30,80)} − ${rnd(5,20)} = ___`
    ];
    const hard = [
      `${rnd(40,90)} + ${rnd(15,50)} = ___ (עם המרת עשרות)`,
      `${rnd(50,99)} − ${rnd(20,48)} = ___`,
      `השלם: ___ + ${rnd(15,40)} = ${rnd(50,99)}`,
      `כמה עשרות יש ב-${rnd(21,99)}? הצג כ-___×10 + ___`
    ];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  /* כיתות ג-ד: עד מיליון, אלגוריתם מאונך, אומדן */
  if (band === 'elem_mid') {
    const a=rnd(100,999), b=rnd(100,999);
    const big_a=rnd(1000,9999), big_b=rnd(1000,9999);
    const easy   = [`${a} + ${b} = ___`, `${a+b} − ${b} = ___`, `${big_a} + ${big_b} = ___`];
    const medium = [`אמוד ל-100 הקרוב: ${rnd(1000,5999)} + ${rnd(1000,4999)} ≈ ___`, `${rnd(10000,99999)} − ${rnd(10000,49999)} = ___`];
    const hard   = [`בקיצור: 999 + ${rnd(100,500)} (רמז: 1000 − 1)`, `${rnd(100000,500000)} + ${rnd(100000,400000)} = ___ (אלפים, מאות, עשרות, אחדות)`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  /* כיתות ה-ו: מספרים עשרוניים */
  if (band === 'elem_high') {
    const a=rnd(1,9), b=rnd(10,99), c=rnd(1,9), d=rnd(10,99);
    const easy   = [`${a}.${b} + ${c}.${d} = ___`, `${rnd(10,99)}.${rnd(10,99)} − ${rnd(1,9)}.${rnd(10,99)} = ___`];
    const medium = [`${a}.${b} + ${c}.${d} + ${rnd(1,5)}.${rnd(10,99)} = ___`, `${rnd(10,99)}.${rnd(10,99)} − (${rnd(1,9)}.${rnd(10,99)} + ${rnd(1,4)}.${rnd(10,99)}) = ___`];
    const hard   = [`מצא x: x + ${a}.${b} = ${a+c}.${rnd(10,99)}`, `השווה ואמוד: ${a}.${b} + ${c}.${d} לעומת ${rnd(5,20)} — מי גדול?`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  // כיתות ז+: ביטויים אלגבריים
  const a=rnd(2,6), b=rnd(1,8), c=rnd(2,5), d=rnd(1,8);
  const easy   = [`פשט: ${a}x + ${b} + ${c}x − ${d}`];
  const medium = [`פשט: (${a}x + ${b}) − (${c}x − ${d})`, `פשט: ${a}(x+${b}) + ${c}(x+${d})`];
  const hard   = [`פשט: ${a}(x+${b})² − ${c}(x+${b})`, `הרחב וכנס: (x+${b})(x+${d}) − x²`];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   STATISTICS — GRADE-AWARE
   ============================================================ */
function statsExercise(diff, band) {
  const data = Array.from({length:rnd(5,8)}, ()=>rnd(50,100));
  const sorted = [...data].sort((a,b)=>a-b);
  const sum = data.reduce((s,v)=>s+v,0);
  const avg = (sum/data.length).toFixed(1);
  if (bandAtMost(band, 'elem_high')) {
    return pick([`ממוצע: ${data.slice(0,5).join(', ')}`, `מהו הערך הגבוה ביותר בסדרה: ${data.slice(0,5).join(', ')}?`]);
  }
  if (band === 'middle') {
    const easy   = [`ממוצע: ${data.join(', ')}`, `מצא חציון: ${sorted.join(', ')}`];
    const medium = [`ממוצע, חציון ושכיח: ${data.join(', ')}`, `מה הטווח? ${sorted.join(', ')}`];
    const hard   = [`5 תלמידים קיבלו ציונים: ${data.slice(0,5).join(', ')}. נוסף תלמיד שישי — הממוצע עלה ל-${(sum/data.length+rnd(1,5)).toFixed(0)}. מה ציון התלמיד החדש?`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  // high
  const vals = Array.from({length:6}, ()=>rnd(55,95));
  const mean = (vals.reduce((s,v)=>s+v,0)/vals.length).toFixed(1);
  const easy   = [`ממוצע וסטיית תקן לדגימה: ${vals.join(', ')}`];
  const medium = [`ממוצע 6 ציונים = ${mean}. מצא 5 הציונים הנתונים: ${vals.slice(0,5).join(', ')}. מה הציון השישי?`, `שונות: ${vals.join(', ')}`];
  const hard   = [`בדוק: האם הנתונים ${vals.join(', ')} מתפלגים נורמלית? חשב ממוצע וסטיית תקן`, `${rnd(20,40)}% מהמדגם נמצאים מתחת ל-70. מה הממוצע אם σ=${rnd(8,15)}? (הסבר)`];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   SEQUENCES — GRADE-AWARE
   ============================================================ */
function seqExercise(diff, band) {
  const a1=rnd(1,10), d=rnd(1,8), q=rnd(2,4);
  const seq5 = Array.from({length:5},(_,i)=>a1+i*d).join(', ');
  const gseq5 = Array.from({length:5},(_,i)=>a1*q**i).join(', ');
  const n = rnd(5,15);
  if (bandAtMost(band, 'middle')) {
    const easy   = [`מצא האיבר הבא: ${seq5}, ___`, `מצא האיבר הבא: ${a1}, ${a1*q}, ${a1*q*q}, ___`];
    const medium = [`סדרה חשבונית: ${seq5}. מצא: הפרש, האיבר ה-${n}`, `סדרה גיאומטרית: ${a1}, ${a1*q}, ${a1*q**2}. מצא: מנה, האיבר ה-${rnd(4,7)}`];
    const hard   = [`סכום ${n} האיברים הראשונים בסדרה החשבונית: ${seq5}`];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }
  const S = n*(2*a1+(n-1)*d)/2;
  const easy   = [`סדרה חשבונית: a₁=${a1}, d=${d}. מצא a₁₀ ו-S₁₀`, `סדרה גיאומטרית: a₁=${a1}, q=${q}. מצא a₅`];
  const medium = [`ב-S_n = ${S}: סדרה חשבונית a₁=${a1}, d=${d}. מצא n`, `סדרה גיאומטרית: ${gseq5}. חשב S₆`];
  const hard   = [`הוכח: S_n = n/2·(2a₁+(n-1)d)`, `סדרה גיאומטרית אינסופית: a₁=${a1}, |q|=${rnd(1,4)}/10. מצא סכום לאינסוף`];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   TRIGONOMETRY — כיתה ט (sin, cos, tan במשולש ישר-זווית)
   ============================================================ */
function trigExercise(diff, band) {
  const ang = pick([30,45,60]);
  const hyp = rnd(8,20), opp = rnd(4,12);
  const sinV = {30:'½', 45:'√2/2', 60:'√3/2'}[ang];
  const cosV = {30:'√3/2', 45:'√2/2', 60:'½'}[ang];
  const tanV = {30:'√3/3', 45:'1', 60:'√3'}[ang];
  const a_side = rnd(5,15), b_side = rnd(5,15), ang_C = pick([30,45,60]);
  const sinC = {30:'½', 45:'√2/2', 60:'√3/2'}[ang_C];
  const easy = [
    `במשולש ישר-זווית: היפותנוזה=${hyp}, זווית α=${ang}°. חשב הצלע הנגדית (sin${ang}°=${sinV})`,
    `במשולש ישר-זווית: היפותנוזה=${hyp}, זווית α=${ang}°. חשב הצלע הצמודה (cos${ang}°=${cosV})`,
    `אמת: sin²${ang}° + cos²${ang}° = 1 (הכנס ערכים: ${sinV}² + ${cosV}²)`,
    `מצא זווית α: tanα = ${tanV}. (α = ${ang}°)`
  ];
  const medium = [
    `במשולש ישר-זווית: צלע נגדית=${opp}, זווית=${ang}°. חשב ההיפותנוזה (sin${ang}°=${sinV})`,
    `שטח משולש: צלעות ${a_side} ו-${b_side} ס"מ, זווית ביניהן ${ang_C}°. שטח = ½·${a_side}·${b_side}·sin${ang_C}° (${sinC})`,
    `במשולש ישר-זווית: שתי הרגליות ${rnd(3,8)} ו-${rnd(3,8)}. מצא זווית α (tanα = רגל נגדית/רגל צמודה)`,
    `רגל=${opp}, זווית=${ang}°. חשב: היפותנוזה (÷sin) ורגל שנייה (÷tan${ang}°=${tanV})`
  ];
  const hard = [
    `בשדה מרובע: אלכסון ${hyp} מ' חוצה אותו לשני משולשים ישרי-זווית. זווית ${ang}°. חשב שטח השדה`,
    `עמוד: מנקודה ${hyp} מ' מבסיסו, זווית ראייה=${ang}°. חשב גובה (tan${ang}°=${tanV}). מה המרחק ישיר מנקודה לפסגה?`,
    `הוכח: בכל משולש ישר-זווית, tanα = sinα/cosα. והוכח גם: sin²α + cos²α = 1 מפיתגורס`
  ];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   FUNCTIONS — GRADE-AWARE (לינארית ז-ח, ריבועית ט)
   ============================================================ */
function functionsExercise(diff, band) {
  const m=rnd(-4,4)||1, n=rnd(-6,6);
  const a=rnd(1,3), b=rnd(-5,5), c=rnd(-8,8);

  /* ── כיתות ז-ח: פונקציה לינארית y = mx + b ── */
  if (band === 'middle') {
    const x1=rnd(-3,3), y1=rnd(-3,3), x2=rnd(1,6), y2=rnd(1,8);
    const easy = [
      `ישר y = ${m}x + ${n}: מה השיפוע? מה חתך-y? חשב y עבור x = ${rnd(-3,5)}`,
      `מצא חתך-x של ישר y = ${m}x + ${n}`,
      `שני ישרים: y = ${m}x + ${n} ו-y = ${-m}x + ${rnd(-4,4)}. האם מקבילים? האם מאונכים?`
    ];
    const medium = [
      `שיפוע ישר העובר ב-(${x1},${y1}) ו-(${x2},${y2}). כתוב משוואתו`,
      `מצא נקודת חיתוך: y = ${m}x + ${n} עם y = ${-m+1}x + ${n+rnd(1,5)}`,
      `שיפוע = ${m}, עובר ב-(${x1},${y1}). כתוב משוואה בצורת y = mx + b`
    ];
    const hard = [
      `חברת טלפון גובה ${rnd(20,50)} ₪ קבוע + ${rnd(1,5)} ₪ לדקה. כתוב פונקציה לינארית. מתי עדיף מנוי ב-${rnd(100,300)} ₪ ל-${rnd(100,300)} דקות?`,
      `הוכח: שני ישרים בעלי שיפועים שמכפלתם = −1 הם מאונכים זה לזה`,
      `מצא a ו-b בישר y = ax + b אם עובר ב-(${x1},${y1}) ו-(${x2},${y2}). בדוק את פתרונך`
    ];
    return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
  }

  /* ── כיתה ט: פונקציה ריבועית / פרבולה ── */
  const easy = [
    `y = x² + ${b}x + ${c}: מצא קודקוד וציר סימטריה`,
    `y = (x − ${rnd(1,4)})² + ${rnd(-3,3)}: מה הקודקוד? מתי y מינימלי?`,
    `f(x) = x² + ${b}x + ${c}: חשב f(0) ו-f(${rnd(1,3)}). מתי f(x) = 0?`
  ];
  const medium = [
    `y = ${a}x² + ${b}x + ${c}: מצא קודקוד, ציר סימטריה, נקודות חיתוך עם ציר x`,
    `y = x² + ${b}x + ${c}: מצא תחומי חיוביות ושליליות`,
    `הזז פרבולת y = x² ב-${rnd(1,4)} ימינה ו-${rnd(1,4)} למעלה. כתוב משוואה חדשה ומצא קודקוד`
  ];
  const hard = [
    `מצא ערך מינימלי/מקסימלי של f(x) = ${a}x² + ${b}x + ${c}. עבור אילו x הפונקציה שלילית?`,
    `מצא חיתוך פרבולה y = x² + ${b}x + ${c} עם ישר y = ${m}x + ${n}. כמה נקודות חיתוך?`,
    `לאיזה ערך k הפרבולה y = x² + ${b}x + k משיקה לציר x? (Δ = 0 — מצוינות: הסבר גיאומטרית)`
  ];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   PROBABILITY
   ============================================================ */
function probabilityExercise(diff, band) {
  const n=rnd(3,8), k=rnd(1,n-1);
  const easy   = [`שק מכיל ${n} כדורים: ${k} אדומים ו-${n-k} כחולים. מה ההסתברות להוצאת כדור אדום?`, `הטלת קוביה: P(זוגי) = ?`];
  const medium = [
    `הטלת 2 קוביות: P(סכום = ${rnd(5,10)}) = ?`,
    `${n} תלמידים, ${k} בנות. נבחרת ועדה של ${rnd(2,3)}. P(כולן בנות)?`
  ];
  const hard   = [
    `${rnd(3,6)} הגרלות עצמאיות. P(ניצחון פעם אחת לפחות) אם P(ניצחון כל פעם) = ${rnd(1,4)}/10`,
    `הסתברות מותנית: P(A)=${rnd(3,7)}/10, P(B|A)=${rnd(2,6)}/10. חשב P(A∩B) ו-P(A∪B)`
  ];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

/* ============================================================
   GENERAL FALLBACK — GRADE-AWARE
   ============================================================ */
function generalExercise(diff, band, gradeNum) {
  gradeNum = gradeNum || 7;
  if (band === 'elem_low')  return addSubExercise(diff, band);
  if (band === 'elem_mid')  return diff==='hard' ? multDivExercise(diff,band) : addSubExercise(diff,band);
  if (band === 'elem_high') {
    const fns = [()=>multDivExercise(diff,band), ()=>fractionsExercise(diff,band), ()=>percentExercise(diff,band), ()=>geoExercise(diff,band,gradeNum)];
    return pick(fns)();
  }
  if (band === 'middle') {
    const fns = [()=>algebraExercise(diff,band,gradeNum), ()=>geoExercise(diff,band,gradeNum), ()=>signedNumbersExercise(diff,band), ()=>functionsExercise(diff,band)];
    return pick(fns)();
  }
  // כיתה ט (high_low)
  const fns = [()=>algebraExercise(diff,band,gradeNum), ()=>geoExercise(diff,band,gradeNum), ()=>trigExercise(diff,band), ()=>functionsExercise(diff,band)];
  return pick(fns)();
}

/* ============================================================
   MAIN DISPATCHER
   ============================================================ */
function makeExercise(subject, difficulty, gradeNum, index) {
  const band = getBand(gradeNum);
  const type = detectSubject(subject);
  switch(type) {
    case 'geometry':       return geoExercise(difficulty, band, gradeNum);
    case 'angles':         return anglesExercise(difficulty, band);
    case 'trig':           return trigExercise(difficulty, band);
    case 'functions':      return functionsExercise(difficulty, band, gradeNum);
    case 'algebra':        return algebraExercise(difficulty, band, gradeNum);
    case 'signed_numbers': return signedNumbersExercise(difficulty, band);
    case 'fractions':        return fractionsExercise(difficulty, band);
    case 'fractions_add':    return fractionsAddExercise(difficulty, band);
    case 'fractions_mixed':  return fractionsMixedExercise(difficulty, band);
    case 'fractions_mult':   return fractionsMultExercise(difficulty, band);
    case 'percent':        return percentExercise(difficulty, band);
    case 'mult_div':       return multDivExercise(difficulty, band);
    case 'add_sub':        return addSubExercise(difficulty, band);
    case 'statistics':     return statsExercise(difficulty, band);
    case 'sequences':      return seqExercise(difficulty, band);
    case 'probability':    return probabilityExercise(difficulty, band);
    default:               return generalExercise(difficulty, band, gradeNum);
  }
}

/* ============================================================
   VERBAL QUESTIONS — GRADE-AWARE
   ============================================================ */
function makeVerbalQuestion(subject, difficulty, gradeNum, index) {
  const band = getBand(gradeNum);
  const type = detectSubject(subject);

  if (type === 'geometry' || type === 'trig') return geoVerbal(difficulty, band, gradeNum);
  if (type === 'algebra' || type === 'functions') return algebraVerbal(difficulty, band, gradeNum);
  if (type === 'signed_numbers') return signedNumbersVerbal(difficulty, band);
  if (type === 'percent') return percentVerbal(difficulty, band);
  if (type === 'statistics') return statsVerbal(difficulty, band);
  return generalVerbal(difficulty, band, gradeNum);
}

function signedNumbersVerbal(diff, band) {
  const a = rnd(3,15), b = rnd(2,10), rise = rnd(3,12), drop = rnd(2,8);
  const easy = [
    `חום בירושלים בלילה: −${a}°. ביום עלה ב-${a+b} מעלות. מה הטמפרטורה ביום?`,
    `מעלית בקומה −${rnd(1,3)} (מרתף). עלתה ${rnd(3,8)} קומות. באיזו קומה עכשיו?`,
    `חשבון בנק: יתרה −${a*100} ₪. הופקדו ${a*100+b*50} ₪. מה היתרה כעת?`
  ];
  const medium = [
    `טמפרטורה: בבוקר −${a}°, בצהריים עלתה ב-${rise}°, בערב ירדה ב-${drop}°. מה הטמפרטורה בערב?`,
    `עסק רשם רווח של ${a*1000} ₪ בינואר, הפסד של ${b*1000} ₪ בפברואר, ורווח של ${(a-b+rnd(1,5))*1000} ₪ במרץ. מה הרווח/הפסד הכולל?`,
    `צלילן צולל ממפלס 0. יורד ${a} מ', עולה ${rnd(2,a-1)} מ', ואז יורד שוב ${b} מ'. באיזה מפלס עומד?`
  ];
  const hard = [
    `שתי ערים: א' בגובה ${a*100} מ' מעל פני הים, ב' בגובה −${b*100} מ' (מתחת). מה ההפרש בגובה? אם הטמפרטורה יורדת ב-${rnd(1,3)}° לכל 100 מ', מה הפרש הטמפרטורה?`,
    `מניה: נפתחה ב-${a*10} ₪, ירדה ${b}% בשלישי, עלתה ${rnd(3,8)}% ברביעי. מה שוויה בסוף יום רביעי?`,
    `${rnd(3,6)} ספורטאים השיגו זמנים (בשניות) ביחס לשיא: +${rnd(1,5)}, −${rnd(1,3)}, +${rnd(2,6)}, −${rnd(1,4)}, +${rnd(1,3)}. מי קרוב ביותר לשיא? מה הממוצע?`
  ];
  return pick(diff==='easy'?easy:diff==='hard'?hard:medium);
}

function geoVerbal(diff, band, gradeNum) {
  gradeNum = gradeNum || 7;
  if (band === 'elem_low') {
    const a=rnd(3,8), b=rnd(3,6);
    return pick([
      `גינה בצורת ריבוע עם צלע ${a} מ'. אמא הולכת סביבה פעמיים. כמה מטרים הלכה?`,
      `כיתה: ${rnd(4,8)} שורות, ${rnd(4,7)} כסאות בכל שורה. כמה כסאות בסך הכל? (כפל כחיבור חוזר)`,
      `מגרש מלבני: אורך ${a} מ', רוחב ${b} מ'. כמה מטרים גדר סביבו?`
    ]);
  }
  if (band === 'elem_mid') {
    const a=rnd(4,12), b=rnd(3,10), cost=rnd(20,80);
    return pick([
      `גינה בצורת מלבן: אורך ${a} מ', רוחב ${b} מ'. עלות ריצוף: ${cost} ₪ למ"ר. מה העלות הכוללת?`,
      `חצר בית ספר ${a}×${b} מ'. נבנית גדר סביבה (${cost} ₪ למטר). מה עלות הגדר? מה שטח החצר?`,
      `מגרש מרובע שהיקפו ${a*4} מ'. מה אורך צלעו? מה שטחו?`
    ]);
  }
  if (band === 'elem_high') {
    const r=rnd(4,10), a=rnd(6,14), h=rnd(4,10), trap_a=rnd(5,12), trap_b=rnd(8,16);
    return pick([
      `בריכה גלילית: רדיוס ${r} מ', עומק ${h} מ'. חשב נפח (π≈3.14). כמה ליטר? (1 מ"ק = 1000 ל')`,
      `שדה חקלאי בצורת טרפז: בסיסים ${trap_a} ו-${trap_b} מ', גובה ${h} מ'. מחיר גידול ${rnd(30,80)} ₪/מ"ר. חשב עלות`,
      `ויטרינה זכוכית: משולש עם בסיס ${a} ס"מ וגובה ${h} ס"מ. מחיר זכוכית ${rnd(50,120)} ₪/מ"ר. חשב עלות 2 פנלים`
    ]);
  }
  if (band === 'middle') {
    const [a,b,c] = pythTriple();
    if (gradeNum <= 7) {
      return pick([
        `סולם ${c} מ' נשען על קיר. רגלו ${b} מ' מהקיר. עד כמה גובה מגיע? (פיתגורס)`,
        `שתי תחנות: האחת ${a} ק"מ צפונה, השנייה ${b} ק"מ מזרחה ממקום המוצא. מה המרחק ביניהן? (פיתגורס)`,
        `מגרש מלבני ${a*2}×${b*2} מ'. נמתח גדר לאורך האלכסון. מה אורך האלכסון?`
      ]);
    } else {
      return pick([
        `מסגרת ריבועית עם אלכסון ${c*2} ס"מ. מה אורך הצלע? מה שטח המסגרת?`,
        `שתי קבוצות: A נמצאת ${a} ק"מ מזרחה, B נמצאת ${b} ק"מ צפונה. מה המרחק הישיר? אם ממש ב-B רוצים לבנות מגדל — מה גובהו כדי לראות ל-A?`,
        `חדר מלבני ${rnd(3,6)}×${rnd(4,8)} מ'. מצא אורך האלכסון (פיתגורס). אם פנל דיקט מכסה קיר של ${rnd(2,4)} מ' גובה, מה שטח המלבן?`
      ]);
    }
  }
  // כיתה ט: דמיון + טריגונומטריה
  const ang = pick([30,45,60]), hyp = rnd(10,30);
  const tanV = {30:'0.577',45:'1',60:'1.732'}[ang];
  const sinV = {30:'0.5',45:'0.707',60:'0.866'}[ang];
  return pick([
    `עפיפון: חוט ${hyp} מ', זווית עם קרקע ${ang}°. מה גובהו? מה מרחקו אופקי? (sin${ang}°≈${sinV}, cos)`,
    `מגדל: מנקודה ${hyp} מ' מבסיסו, זווית ראייה ${ang}°. חשב גובה (tan${ang}°≈${tanV}). מה המרחק הישיר מנקודה לפסגה?`,
    `שני מגדלים גבוהים ${rnd(20,50)} מ' ו-${rnd(30,60)} מ' עומדים ${hyp} מ' זה מזה. מה המרחק בין פסגותיהם? (פיתגורס + גובה)`
  ]);
}

function algebraVerbal(diff, band, gradeNum) {
  gradeNum = gradeNum || 7;
  if (bandAtMost(band, 'elem_mid')) {
    const price=rnd(5,15), count=rnd(3,8);
    return pick([
      `לנועה ${price*count} ₪. קנתה ${count} מחברות. כמה עולה כל מחברת? (כתוב משוואה)`,
      `ספר עולה ${price} ₪. כמה ספרים אפשר לקנות ב-${price*count} ₪? כמה כסף ישאר?`
    ]);
  }
  if (band === 'elem_high') {
    const total=rnd(30,80), b=rnd(2,8);
    return pick([
      `עלות כרטיס: x ₪. עלות חטיף: ${b} ₪. שילמת ${total} ₪ עבור ${rnd(2,4)} כרטיסים וחטיף. מצא x (כתוב משוואה)`,
      `שני ילדים חסכו יחד ${total} ₪. אחד חסך ${b} ₪ יותר מהשני. כמה כל אחד? (הגדר נעלם)`
    ]);
  }
  if (band === 'middle') {
    const a=rnd(5,20), b=rnd(2,8), v=rnd(40,80), dist=rnd(60,180);
    if (gradeNum <= 7) {
      // כיתה ז: בעיות תנועה S=V·T, אחוזים, גיל
      return pick([
        `אחים: הבכור מבוגר ב-${b} שנים מהצעיר. סכום גילאיהם ${a*2+b}. מצא גיל כל אחד (הגדר x)`,
        `רכב נוסע ${v} קמ"ש. המסע ${dist} ק"מ. כמה שעות? (S = V×T) אם יתעכב ${rnd(10,30)} דק' — מה זמן ההגעה?`,
        `מחיר חולצה: x ₪. אחרי הנחה ${b*10}% שילם ${Math.round(a*10*(1-b*10/100))} ₪. מה המחיר המקורי?`
      ]);
    } else {
      // כיתה ח: בעיות הספק, תנועה מורכבת
      const fill_a=rnd(3,8), fill_b=rnd(fill_a+1,fill_a+6);
      return pick([
        `ברז א' ממלא בריכה ב-${fill_a} ש', ברז ב' ב-${fill_b} ש'. תוך כמה שעות יתמלאו יחד? (בעיית הספק: 1/${fill_a} + 1/${fill_b} = 1/t)`,
        `שני רכבים: האחד יוצא מ-A במהירות ${v} קמ"ש, השני מ-B (${dist} ק"מ) לקראתו במהירות ${v+rnd(10,30)} קמ"ש. תוך כמה יפגשו ואיפה?`,
        `עובד מרוויח ${v} ₪/שעה. ${rnd(2,4)} שעות נוספות ב-${rnd(20,50)}% תוספת. חשב שכר ${rnd(8,12)} שעות (כולל נוספות)`
      ]);
    }
  }
  // כיתה ט: תנועה מורכבת, הספק, אופטימיזציה
  const v1=rnd(40,80), v2=rnd(80,130), dist=rnd(200,400);
  const rate_a=rnd(50,150), rate_b=rnd(50,150), target=rnd(500,2000);
  return pick([
    `שני רכבים יוצאים לקראת זה: ${v1} ו-${v2} קמ"ש, מרחק ${dist} ק"מ. תוך כמה יפגשו? היכן? (הגדר t)`,
    `מכונה A מייצרת ${rate_a} יח'/יום, B מייצרת ${rate_b}. יחד — תוך כמה ימים לייצר ${target} יחידות?`,
    `גן עם שטח ${rnd(50,200)} מ"ר. אורכו גדול ב-${rnd(2,8)} מ' מרוחבו. מצא את המימדים. מה ההיקף? (הגדר משוואה ריבועית)`
  ]);
}

function percentVerbal(diff, band) {
  const price=rnd(100,500)*2, pct=pick([10,15,20,25,30]);
  const pool_easy = [
    `מחיר מוצר: ${price} ₪. הנחה ${pct}%. מה המחיר לאחר הנחה?`,
    `כיתה: ${rnd(25,35)} תלמידים. ${pct}% לא הגיעו. כמה נוכחים?`
  ];
  const pool_medium = [
    `מחיר עלה ב-${pct}% ל-${Math.round(price*(1+pct/100))} ₪. מה היה המחיר?`,
    `חנות נתנה ${pct}%, אח"כ עוד ${pct}% הנחה. מה ההנחה הכוללת באחוזים?`
  ];
  const pool_hard = [
    `ריבית שנתית ${pct}% (דריבית). מה הסכום לאחר ${rnd(3,7)} שנים אם ההשקעה הראשונית ${rnd(5000,20000)} ₪?`,
    `מחיר דירה עלה ב-${pct}% לשנה שנתיים ברציפות. מה עלייה כוללת? האם זהה לעלייה של ${pct*2}%?`
  ];
  return pick(diff==='easy'?pool_easy:diff==='hard'?pool_hard:pool_medium);
}

function statsVerbal(diff, band) {
  const scores = Array.from({length:rnd(5,8)}, ()=>rnd(60,100));

      `ציוני מבחן: ${scores.join(', ')}. חשב ממוצע, חציון ושכיח`,
      `${scores.length} תלמידים קיבלו ממוצע ${avg}. נוסף תלמיד שקיבל ${rnd(70,100)}. מה הממוצע החדש?`
    ]);

  return pick([
    `ציוני מחלקה: ${scores.join(', ')}. חשב ממוצע, סטיית תקן. איזה ציון נמצא מחוץ לטווח μ±σ?`,
    `דגימת ${rnd(5,10)} מדידות: ${scores.join(', ')}. הצג תיבת-שפם (box plot). פרש את המיפוי הסטטיסטי`

}

      ]);
    } else {
      return pick([

  // כיתה ט
  const v1=rnd(40,80), v2=rnd(60,120), dist=rnd(200,500);

}
